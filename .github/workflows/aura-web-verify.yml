name: AuraCue Web Verify

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  web-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      T13_BROWSER: /usr/bin/google-chrome-stable
      T14_BROWSER: /usr/bin/google-chrome-stable
      AURACUE_WEB_VISUAL_OUTPUT_ROOT: apps/web/tests/visual/artifacts/aura-ui-replica
      AURACUE_WEB_VISUAL_TASK_ID: T15-aura-ui-replica
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Enable pnpm
        run: |
          corepack enable
          corepack prepare pnpm@10.24.0 --activate
          pnpm --version

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web
        run: pnpm build:web

      - name: Typecheck web
        run: pnpm typecheck:web

      - name: Test web smoke
        run: pnpm test:web

      - name: Runtime screenshot smoke
        run: pnpm --filter @auracue/web test:e2e

      - name: Owner click screenshot smoke
        run: node apps/web/e2e/run-web-p0-runtime-smoke.mjs owner-click-e2e

      - name: Visual compare
        run: pnpm --filter @auracue/web test:visual

      - name: Upload AuraCue visual artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: aura-web-verify-artifacts
          path: |
            docs/auto-execute/logs/web
            docs/auto-execute/screenshots/web
            docs/auto-execute/results/web
            docs/auto-execute/latest/web
            apps/web/tests/visual/artifacts/aura-ui-replica
          if-no-files-found: warn
