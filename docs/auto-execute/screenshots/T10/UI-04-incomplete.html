<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AuraCue UI-04 Incomplete Selection</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #ffffff; color: #10213d; font-family: Inter, Arial, sans-serif; }
    .device { width: 704px; height: 1516px; margin: 52px auto 0; padding: 64px 38px 0; border: 28px solid #0b0d10; border-radius: 104px; background: linear-gradient(180deg,#fdf8f3 0%,#fdf8f3 72%,#f7dce9 100%); overflow: hidden; box-shadow: 0 0 0 4px #2b2d32, 0 22px 58px rgba(0,0,0,.22); }
    .top { display: grid; grid-template-columns: 68px 1fr 68px; align-items: center; margin-bottom: 78px; }
    .back { width: 64px; height: 64px; border-radius: 999px; border: 2px solid #f3c9d8; background: rgba(255,255,255,.68); color: #10213d; font-size: 32px; }
    .brand, h2, .cta { font-family: Georgia, serif; }
    .brand { text-align: center; font-size: 38px; font-weight: 700; }
    h2 { text-align: center; font-size: 36px; margin: 0 0 46px; }
    .scenes { display: grid; grid-template-columns: repeat(4, 1fr); gap: 22px; margin-bottom: 76px; }
    .scene { border: 2px solid #f2c9d4; background: rgba(255,255,255,.52); border-radius: 34px; min-height: 150px; color: #10213d; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 8px; }
    .scene::after, .chip::after, .cta::after { border: 0; }
    .scene.selected { background: linear-gradient(180deg,#ff6b98 0%,#ef3470 100%); color: white; box-shadow: 0 0 22px rgba(239,52,112,.34); }
    .scene span { font-size: 16px; }
    .scene strong { font-size: 25px; font-weight: 600; line-height: 1.05; }
    .scene small { font-size: 16px; line-height: 1; }
    .divider { display: flex; align-items: center; gap: 32px; color: #efb47d; margin-bottom: 64px; font-size: 24px; }
    .divider::before, .divider::after { content: ""; height: 2px; flex: 1; background: #f1d8d4; }
    .chips { display: grid; grid-template-columns: repeat(3, 1fr); gap: 26px; margin-bottom: 78px; }
    .chip { height: 72px; border-radius: 999px; border: 2px solid #efc7d2; background: rgba(255,255,255,.48); color: #10213d; font-size: 24px; }
    .validation { margin: 0 30px 42px; min-height: 88px; border-radius: 34px; border: 2px solid #efc7d2; color: #ec3c77; background: rgba(255,255,255,.55); display: flex; align-items: center; justify-content: center; gap: 18px; font-size: 26px; }
    .cta { width: calc(100% - 60px); margin: 0 30px; min-height: 104px; border: 0; border-radius: 999px; color: #88898d; background: #e7e1dd; font-size: 34px; box-shadow: inset 0 2px 6px rgba(0,0,0,.06); }
  </style>
</head>
<body>
  <main class="device">
    <header class="top"><button class="back">‹</button><div class="brand">✦ AuraCue ✦</div><div></div></header>
    <h2>Choose your scene</h2>
    <section class="scenes"><button class="scene" data-scene="date"><span>heart</span><strong>Date</strong></button><button class="scene selected" data-scene="work"><span>briefcase</span><strong>Work</strong></button><button class="scene" data-scene="party"><span>party</span><strong>Party</strong></button><button class="scene" data-scene="luck"><span>person</span><strong>Just me</strong><small>Just need luck</small></button></section>
    <div class="divider">✦</div>
    <h2>Choose your energy</h2>
    <section class="chips"><button class="chip" data-energy="confidence">Confidence</button><button class="chip" data-energy="calm">Calm</button><button class="chip" data-energy="love">Love</button><button class="chip" data-energy="focus">Focus</button><button class="chip" data-energy="luck">Luck</button><button class="chip" data-energy="charm">Charm</button></section>
    <section class="validation">✦ Choose one energy to continue.</section>
    <button class="cta" disabled>✦ Generate My Aura Card</button>
  </main>
</body>
</html>
