<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AuraCue UI-03 Energy Selection</title>
  <style>
    body { margin: 0; background: #fbf8f4; color: #10213d; font-family: Inter, system-ui, sans-serif; }
    .phone { width: 390px; min-height: 844px; margin: 0 auto; padding: 16px 24px 22px; box-sizing: border-box; background: radial-gradient(circle at 50% 20%, #fffdfb 0%, #f5f1eb 100%); }
    .status { display: flex; justify-content: space-between; font-size: 14px; font-weight: 700; margin-bottom: 20px; }
    .top { position: relative; text-align: center; margin-bottom: 8px; }
    .back { position: absolute; left: 0; top: 0; width: 48px; height: 48px; border-radius: 999px; border: 0; background: white; color: #a68154; font-size: 24px; box-shadow: 0 8px 20px rgba(166,129,84,.08); }
    .brand, h1, .cta { font-family: Georgia, serif; }
    .brand { display: block; font-size: 40px; line-height: 48px; font-weight: 700; }
    .rule { margin: 8px auto 16px; width: 120px; color: #c5a059; border-top: 1px solid rgba(197,160,89,.28); text-align: center; }
    .step { display: inline-block; padding: 8px 18px; border: 1px solid rgba(197,160,89,.22); border-radius: 999px; color: #a67c4b; background: rgba(255,255,255,.55); font-size: 13px; }
    h1 { font-size: 31px; line-height: 1.12; text-align: center; margin: 16px 0 10px; }
    .copy { text-align: center; color: #6b7280; line-height: 1.45; margin: 0 0 24px; font-size: 14px; }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; margin-bottom: 20px; }
    .energy-card { position: relative; min-height: 94px; border: 1px solid transparent; border-radius: 20px; background: rgba(255,255,255,.64); display: flex; align-items: center; gap: 14px; padding: 14px; text-align: left; color: #10213d; box-shadow: 0 5px 16px rgba(0,0,0,.035); }
    .energy-card::after { border: 0; }
    .energy-card.selected { border-color: #e5c284; box-shadow: 0 0 16px rgba(229,194,132,.36); background: white; }
    .energy-icon { width: 48px; height: 48px; border-radius: 999px; background: #fff5ec; color: #c5a059; display: grid; place-items: center; flex: 0 0 48px; font-size: 10px; }
    .energy-icon.luck, .energy-icon.love { background: #fdeff3; color: #e08ba3; }
    .energy-icon.calm, .energy-icon.focus { background: #f0f3f8; color: #7e8ba4; }
    strong { display: block; font-family: Georgia, serif; font-size: 20px; line-height: 1.1; margin-bottom: 6px; }
    small { display: block; color: #6b7280; font-size: 11px; line-height: 1.35; }
    i { position: absolute; top: 12px; right: 12px; width: 22px; height: 22px; border-radius: 999px; background: #b68c5e; color: white; font-style: normal; font-size: 8px; text-align: center; line-height: 22px; }
    .energy-card:not(.selected) i { display: none; }
    .prompt { border: 1px solid rgba(244,194,205,.55); border-radius: 20px; background: linear-gradient(135deg, rgba(255,241,242,.45), rgba(255,255,255,.84)); padding: 18px 20px; margin-bottom: 22px; }
    .prompt strong { font-size: 17px; }
    .line { margin-top: 14px; border-bottom: 1px solid #e8d6d1; color: #6b7280; font-size: 12px; padding-bottom: 12px; }
    .cta { width: 100%; min-height: 58px; border: 0; border-radius: 999px; color: white; font-size: 23px; background: linear-gradient(180deg,#d4a773 0%,#a67c4b 100%); box-shadow: 0 14px 30px rgba(166,124,75,.22); }
    .trust { display: block; color: #747b87; text-align: center; font-size: 12px; margin-top: 14px; }
  </style>
</head>
<body>
  <main class="phone">
    <div class="status"><span>9:41</span><span>signal wifi battery</span></div>
    <header class="top"><button class="back">‹</button><span class="brand">AuraCue</span><div class="rule">✦</div><span class="step">Step 2 of 2</span></header>
    <h1>What energy do you<br>need today?</h1>
    <p class="copy">Choose the energy you want to invite in.<br>Your card will be aligned to support it. ✨</p>
    <section class="grid"><button class="energy-card selected" data-energy="confidence">
      <span class="energy-icon confidence">spark</span>
      <span><strong>Confidence</strong><small>Stand tall. Believe in you.</small></span>
      <i>check</i>
    </button><button class="energy-card" data-energy="luck">
      <span class="energy-icon luck">clover</span>
      <span><strong>Luck</strong><small>Open doors. Attract opportunity.</small></span>
      <i></i>
    </button><button class="energy-card" data-energy="love">
      <span class="energy-icon love">heart</span>
      <span><strong>Love</strong><small>Open your heart. Invite meaningful love.</small></span>
      <i></i>
    </button><button class="energy-card" data-energy="calm">
      <span class="energy-icon calm">moon</span>
      <span><strong>Calm</strong><small>Find peace. Let go of what weighs you down.</small></span>
      <i></i>
    </button><button class="energy-card" data-energy="charm">
      <span class="energy-icon charm">star</span>
      <span><strong>Charm</strong><small>Magnetic energy. Naturally draw people in.</small></span>
      <i></i>
    </button><button class="energy-card" data-energy="focus">
      <span class="energy-icon focus">eye</span>
      <span><strong>Focus</strong><small>Clear your mind. Stay aligned and on track.</small></span>
      <i></i>
    </button></section>
    <section class="prompt"><strong>✦ How do you feel today?</strong><div class="line">Share anything that's on your heart... (optional)</div></section>
    <button class="cta">✦ Generate My Lucky Aura Card</button>
    <span class="trust">Private. Personal. Just for you.</span>
  </main>
</body>
</html>
