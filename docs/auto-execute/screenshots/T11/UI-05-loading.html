<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AuraCue UI-05 Generation Ritual</title>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; background: #fdf9f3; color: #111827; font-family: Inter, Arial, sans-serif; }
    .device { width: 941px; height: 1672px; margin: 0 auto; padding: 100px 58px 0; background: radial-gradient(circle at 50% 48%, #fff5ed 0%, #fdf9f3 100%); overflow: hidden; position: relative; }
    .device::before { content: ""; position: absolute; inset: 220px -220px auto; height: 930px; background: radial-gradient(circle, rgba(235,178,126,.26) 0%, rgba(253,249,243,0) 70%); }
    header { position: relative; z-index: 1; display: flex; align-items: center; justify-content: space-between; margin-bottom: 52px; }
    .icon { width: 78px; height: 78px; border: 0; border-radius: 999px; background: white; color: #c5a070; box-shadow: 0 5px 16px rgba(0,0,0,.05); font-size: 20px; }
    .brand, h1 { font-family: Georgia, serif; color: #1a2340; }
    .brand { font-size: 58px; font-weight: 700; }
    main { position: relative; z-index: 1; text-align: center; }
    .spark { color: #c5a070; opacity: .68; margin: 12px 0; font-size: 30px; }
    h1 { margin: 0; font-size: 62px; line-height: 1.12; font-weight: 400; }
    h1 strong { font-weight: 700; color: #c5a070; font-style: italic; }
    .subtitle { color: #71717a; font-size: 26px; line-height: 1.5; margin: 24px 0 84px; }
    .ritual { position: relative; display: grid; place-items: center; min-height: 680px; }
    .orbit { position: absolute; width: 660px; height: 350px; border: 2px dashed rgba(197,160,112,.42); border-radius: 50%; transform: rotate(-15deg); }
    .orbit.second { width: 540px; height: 500px; transform: rotate(12deg); opacity: .72; }
    .card { position: relative; width: 350px; height: 540px; border-radius: 42px; border: 12px solid rgba(197,160,112,.26); background: linear-gradient(145deg,#1a2340,#8757a6 42%,#f0b66e); box-shadow: 0 46px 76px rgba(26,35,64,.24); display: grid; place-items: center; color: white; font-family: Georgia, serif; font-size: 38px; }
    .card::after { content: ""; position: absolute; inset: 42px; border: 2px solid rgba(255,255,255,.46); border-radius: 28px; }
    .glow { width: 610px; height: 140px; margin: -36px auto 44px; background: radial-gradient(ellipse at center, rgba(255,235,180,.62), rgba(255,255,255,0) 70%); filter: blur(12px); }
    .progress { background: rgba(255,255,255,.55); border: 2px solid rgba(255,255,255,.72); border-radius: 52px; padding: 42px 34px; display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; box-shadow: 0 8px 22px rgba(0,0,0,.04); }
    .step { color: #71717a; font-size: 20px; line-height: 1.2; }
    .step-dot { width: 76px; height: 76px; margin: 0 auto 18px; border-radius: 999px; background: white; border: 4px solid #f2eadf; display: grid; place-items: center; color: rgba(26,35,64,.6); font-weight: 700; font-size: 24px; }
    .step.active { color: #c5a070; }
    .step.active .step-dot { border-color: #c5a070; color: #c5a070; }
    .footnote { color: #71717a; font-size: 24px; line-height: 1.55; margin-top: 32px; }
  </style>
</head>
<body>
  <main class="device">
    <header><button class="icon">‹</button><div class="brand">AuraCue</div><button class="icon">gift</button></header>
    <section>
      <div class="spark">✦</div>
      <h1>Drawing your<br><strong>Lucky Aura Card...</strong></h1>
      <p class="subtitle">Matching your scene, energy, and today's vibe.</p>
      <div class="ritual"><div class="orbit"></div><div class="orbit second"></div><div class="card">Aura Card Back</div></div>
      <div class="glow"></div>
      <section class="progress"><div class="step active">
      <div class="step-dot">1</div>
      <span>Reading your<br>mood</span>
    </div><div class="step ">
      <div class="step-dot">2</div>
      <span>Aligning your<br>energy</span>
    </div><div class="step ">
      <div class="step-dot">3</div>
      <span>Revealing your<br>cues</span>
    </div></section>
      <p class="footnote">This takes a few seconds.<br>Good things are unfolding.</p>
    </section>
  </main>
</body>
</html>
