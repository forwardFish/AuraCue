<!doctype html>
<html lang="en">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>AuraCue UI-15 Share Story</title><style>
    body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; color: #111936; background: #fff7f0; }

    .status-list { display: grid; gap: 10px; margin-bottom: 22px; }
