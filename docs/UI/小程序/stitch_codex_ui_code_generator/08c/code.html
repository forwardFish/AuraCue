<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Payment Success - Aura Unlocked</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    .font-serif {
      font-family: 'Playfair Display', serif;
    }
  </style>
<style data-purpose="animations-and-effects">
    .glow-effect {
      box-shadow: 0 0 40px 10px rgba(255, 223, 137, 0.3);
    }
    
    .bg-gradient-pink-peach {
      background: linear-gradient(180deg, #FFF0EE 0%, #FFE6ED 50%, #FFD6E3 100%);
    }

    .card-border {
      border: 2px solid #E5C384;
      box-shadow: 0 10px 30px -5px rgba(0, 0, 0, 0.1);
    }

    .bg-card-inner {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.95) 0%, rgba(255, 255, 255, 0.85) 100%);
      backdrop-filter: blur(10px);
    }

    .btn-primary-gradient {
      background: linear-gradient(90deg, #FF6B9E 0%, #FF4583 100%);
      box-shadow: 0 4px 15px rgba(255, 69, 131, 0.3);
    }

    .floating-sparkle {
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'aura-dark': '#1C2945',
            'aura-gold': '#D4AF37',
            'aura-pink': '#FF6B9E',
            'aura-text': '#2D3748',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-gradient-pink-peach min-h-screen text-aura-dark antialiased relative overflow-hidden flex flex-col items-center justify-start pt-16 pb-10 px-6">
<!-- BEGIN: Background Effects -->
<!-- Decorative Background Elements -->
<div class="absolute inset-0 z-0 pointer-events-none overflow-hidden">
<!-- Placeholder for subtle background sparkles and clouds -->
<div class="absolute top-10 left-10 w-4 h-4 text-aura-gold opacity-60">✨</div>
<div class="absolute top-20 right-16 w-6 h-6 text-aura-pink opacity-40">✦</div>
<div class="absolute top-1/4 left-4 w-3 h-3 text-purple-300 opacity-70">✧</div>
<div class="absolute top-1/3 right-8 w-5 h-5 text-aura-gold opacity-50">✨</div>
<div class="absolute bottom-1/3 left-8 w-6 h-6 text-pink-300 opacity-60">✦</div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full bg-[url('https://placehold.co/800x800/transparent/white?text=Clouds')] bg-cover bg-center opacity-10 mix-blend-overlay"></div>
<!-- Confetti Pieces (Simplified representations) -->
<div class="absolute top-[15%] left-[20%] w-3 h-6 bg-pink-400 rotate-45 rounded-sm opacity-80"></div>
<div class="absolute top-[12%] right-[25%] w-2 h-4 bg-purple-400 -rotate-12 rounded-sm opacity-70"></div>
<div class="absolute top-[25%] right-[15%] w-4 h-2 bg-yellow-400 rotate-12 rounded-sm opacity-90"></div>
</div>
<!-- END: Background Effects -->
<!-- BEGIN: Header Status -->
<!-- Success Icon and Main Title -->
<header class="relative z-10 flex flex-col items-center w-full max-w-sm mt-8 mb-6">
<!-- Success Icon Container -->
<div class="relative mb-6">
<div class="w-24 h-24 rounded-full bg-white/40 flex items-center justify-center glow-effect backdrop-blur-sm">
<div class="w-16 h-16 rounded-full bg-gradient-to-br from-[#FFD275] to-[#E6A840] flex items-center justify-center border-4 border-white shadow-inner">
<svg class="h-8 w-8 text-white" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</div>
</div>
<!-- Radial Rays -->
<svg class="absolute -top-8 -left-8 w-40 h-40 text-yellow-500/20 -z-10 animate-[spin_10s_linear_infinite]" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-dasharray="2 8" stroke-width="1"></circle>
<circle cx="50" cy="50" fill="none" r="38" stroke="currentColor" stroke-dasharray="1 6" stroke-width="1"></circle>
</svg>
</div>
<!-- Title -->
<h1 class="text-3xl font-serif text-center font-semibold leading-tight px-4 relative">
      Your full aura<br/>is unlocked!<span class="text-aura-gold inline-block ml-1 relative top-[-4px] text-2xl">✨</span>
</h1>
</header>
<!-- END: Header Status -->
<!-- BEGIN: Aura Card Preview -->
<!-- Main visual element showing the unlocked aura card -->
<main class="relative z-10 w-full max-w-[320px] flex-grow flex flex-col items-center justify-center mb-8">
<div class="relative w-full aspect-[2.5/4] rounded-2xl overflow-hidden card-border p-1 bg-white">
<!-- Card Image -->
<img alt="Aura Card Background" class="w-full h-full object-cover rounded-xl" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYKIo-XvK3l_uRBXD-okGazLXb7bgqU8wkRmn-qmXOeUooa1b1w-xi1uELV6-aoW-3uuSFMgUqgwCgsB84PrHRfTYIwcuuKoLqeHPfn8wPqTcVyTFkuNSan03wyp8k0c3b7S2URatnyF7h51tTvxAuFoeURKm5Gumrv1i6bPmF-bWHKWivr0D1Fp2ndRoas94SM6BGT-5gLVY8mvvt7Utan85UEJGokDcQJwFKK57XDKjVGWtahvk67qTesKwUWRgyd7csCk0B"/>
<!-- Card Overlay Content (Simplified representation of the inner card) -->
<div class="absolute inset-1 rounded-xl flex flex-col justify-between overflow-hidden">
<!-- Top Section -->
<div class="pt-6 pb-2 px-4 text-center z-10">
<p class="text-white/80 text-[10px] font-medium tracking-widest uppercase mb-1">✧ AuraCue ✧</p>
<h2 class="text-white text-xl font-serif font-medium mb-1 drop-shadow-md">Today's Lucky Aura</h2>
<p class="text-white/90 text-xs drop-shadow-md">May 18, 2025</p>
</div>
<!-- Bottom Details Panel -->
<div class="bg-card-inner mx-3 mb-3 p-4 rounded-xl border border-white/50 relative">
<div class="text-center mb-4">
<h3 class="text-gray-800 font-serif font-semibold text-lg leading-tight">Soft Confidence</h3>
<p class="text-gray-600 text-sm font-medium">Romantic Clarity</p>
</div>
<div class="space-y-3">
<!-- Detail Row 1 -->
<div class="flex items-center justify-between border-b border-gray-200/60 pb-2">
<div class="flex items-center space-x-2">
<span class="text-pink-400 text-sm">❤️</span>
<span class="text-xs font-semibold text-gray-700">Lucky Color</span>
</div>
<div class="flex space-x-1">
<div class="w-4 h-4 rounded-full bg-[#A898D8]"></div>
<div class="w-4 h-4 rounded-full bg-[#FF9EB5]"></div>
<div class="w-4 h-4 rounded-full bg-[#FFB58A]"></div>
</div>
</div>
<!-- Detail Row 2 -->
<div class="flex items-center justify-between border-b border-gray-200/60 pb-2">
<div class="flex items-center space-x-2">
<span class="text-purple-400 text-sm">💬</span>
<span class="text-xs font-semibold text-gray-700">Social Action</span>
</div>
<span class="text-purple-500 text-sm">💬</span>
</div>
<!-- Detail Row 3 -->
<div class="flex items-center justify-between pb-1">
<div class="flex items-center space-x-2">
<span class="text-pink-300 text-sm">👗</span>
<span class="text-xs font-semibold text-gray-700">Outfit Energy</span>
</div>
<span class="text-pink-400 text-sm">👗</span>
</div>
</div>
<!-- Decorative Corners -->
<div class="absolute -top-1 -left-1 w-3 h-3 border-t-2 border-l-2 border-aura-gold/40 rounded-tl-sm"></div>
<div class="absolute -top-1 -right-1 w-3 h-3 border-t-2 border-r-2 border-aura-gold/40 rounded-tr-sm"></div>
<div class="absolute -bottom-1 -left-1 w-3 h-3 border-b-2 border-l-2 border-aura-gold/40 rounded-bl-sm"></div>
<div class="absolute -bottom-1 -right-1 w-3 h-3 border-b-2 border-r-2 border-aura-gold/40 rounded-br-sm"></div>
</div>
</div>
<!-- Outer Card Decorative Border Detail -->
<div class="absolute inset-0 border-[3px] border-[#E5C384]/40 rounded-2xl pointer-events-none z-20 m-[2px]"></div>
</div>
</main>
<!-- END: Aura Card Preview -->
<!-- BEGIN: Action Buttons -->
<footer class="relative z-10 w-full max-w-sm flex flex-col gap-3 mt-auto">
<button class="btn-primary-gradient w-full py-4 rounded-full text-white font-semibold text-lg flex items-center justify-center space-x-2 transition-transform active:scale-95" type="button">
<span>View Full Card</span>
<span class="text-xl">✨</span>
</button>
<button class="bg-white/80 backdrop-blur-md border border-pink-100 w-full py-4 rounded-full text-aura-dark font-semibold text-base flex items-center justify-center space-x-2 transition-transform active:scale-95 shadow-sm" type="button">
<svg class="w-5 h-5 text-gray-600" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span>Share Story</span>
</button>
</footer>
<!-- END: Action Buttons -->
<!-- Safe area bottom padding for modern iPhones -->
<div class="h-8 w-full shrink-0"></div>
</body></html>
