<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AuraCue - Network Exception</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
    }
    
    .font-serif-brand {
      font-family: 'Playfair Display', serif;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              gold: '#E5B76C',
              dark: '#1B264F',
              pink: {
                light: '#FFDCE3',
                primary: '#FF5C8D',
                secondary: '#FF7B9E'
              },
              gray: {
                text: '#6B7280'
              }
            }
          },
          backgroundImage: {
            'ethereal-gradient': 'linear-gradient(180deg, #FDECF0 0%, #FFF4E3 40%, #FDECF0 70%, #F5D3DE 100%)',
            'btn-gradient': 'linear-gradient(90deg, #FF6B9A 0%, #FF4D85 100%)',
          },
          boxShadow: {
            'glow-pink': '0 8px 24px -6px rgba(255, 92, 141, 0.4)',
            'glass': '0 4px 30px rgba(0, 0, 0, 0.05)',
            'card-float': '0 20px 40px rgba(255, 180, 195, 0.4)'
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen">
<!-- BEGIN: Mobile Device Container -->
<main class="relative w-full max-w-[430px] h-[932px] bg-ethereal-gradient overflow-hidden shadow-2xl rounded-[55px] border-[14px] border-black ring-1 ring-gray-900 mx-auto overflow-y-auto custom-scrollbar">
<!-- Status Bar Area (Simulated) -->
<div class="h-12 w-full"></div>
<!-- BEGIN: Top Navigation Bar -->
<header class="flex items-center justify-between px-6 pt-2 pb-4 relative z-10">
<!-- Close Button -->
<button class="w-10 h-10 rounded-full bg-white/40 backdrop-blur-md flex items-center justify-center shadow-glass border border-white/50 text-gray-700 hover:bg-white/60 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Logo with Sparkles -->
<div class="flex items-center space-x-1 absolute left-1/2 -translate-x-1/2">
<svg class="text-brand-gold opacity-60" fill="none" height="12" viewbox="0 0 24 24" width="12" xmlns="http://www.w3.org/2000/svg">
<path d="M12 0L13.5 10.5L24 12L13.5 13.5L12 24L10.5 13.5L0 12L10.5 10.5L12 0Z" fill="currentColor"></path>
</svg>
<h1 class="font-serif-brand text-2xl font-semibold text-brand-gold tracking-wide">AuraCue</h1>
<svg class="text-brand-gold opacity-80 -mt-2" fill="none" height="16" viewbox="0 0 24 24" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="M12 0L14 10L24 12L14 14L12 24L10 14L0 12L10 10L12 0Z" fill="currentColor"></path>
</svg>
</div>
<!-- Placeholder for layout balance -->
<div class="w-10 h-10"></div>
</header>
<!-- END: Top Navigation Bar -->
<!-- BEGIN: Main Content Area -->
<section class="flex flex-col items-center justify-center pt-8 px-8 pb-12 h-[calc(100%-140px)]">
<!-- BEGIN: Hero Illustration -->
<div class="relative w-full aspect-square max-w-[280px] mb-12 flex items-center justify-center">
<!-- Background Glow -->
<div class="absolute inset-0 bg-brand-pink-light/30 rounded-full blur-3xl"></div>
<!-- Tarot Card Base -->
<div class="relative w-40 h-56 bg-white/90 backdrop-blur-sm rounded-xl shadow-card-float border border-brand-pink-light/50 transform -rotate-3 rotate-y-12 translate-x-2">
<!-- Card Inner Border -->
<div class="absolute inset-1.5 border border-brand-pink-light/60 rounded-lg"></div>
<!-- Card Content (Moon & Stars) -->
<div class="absolute inset-0 flex flex-col items-center justify-center opacity-80">
<svg class="text-brand-pink-light mb-4" fill="none" height="60" viewbox="0 0 24 24" width="60" xmlns="http://www.w3.org/2000/svg">
<path d="M21.5 12.5C21.5 17.7467 17.2467 22 12 22C6.75329 22 2.5 17.7467 2.5 12.5C2.5 7.25329 6.75329 3 12 3C12.5 3 13 3.05 13.5 3.15C10.5 4.5 8.5 7.5 8.5 11C8.5 15.1421 11.8579 18.5 16 18.5C18.5 18.5 20.7 17.3 22 15.5C21.8 14.5 21.6 13.5 21.5 12.5Z" fill="currentColor" stroke="currentColor" stroke-linejoin="round" stroke-width="1.5"></path>
</svg>
<!-- Constellation dots -->
<div class="absolute inset-0">
<div class="w-1.5 h-1.5 bg-brand-pink-light rounded-full absolute top-[60%] left-[25%]"></div>
<div class="w-1 h-1 bg-brand-pink-light rounded-full absolute top-[55%] left-[45%]"></div>
<div class="w-1.5 h-1.5 bg-brand-pink-light rounded-full absolute top-[70%] left-[55%]"></div>
<div class="w-1 h-1 bg-brand-pink-light rounded-full absolute top-[65%] left-[75%]"></div>
<!-- Connecting lines (simplified) -->
<svg class="absolute inset-0 w-full h-full text-brand-pink-light/50" viewbox="0 0 160 224">
<line stroke="currentColor" stroke-dasharray="2 2" stroke-width="1" x1="40" x2="72" y1="135" y2="123"></line>
<line stroke="currentColor" stroke-dasharray="2 2" stroke-width="1" x1="72" x2="88" y1="123" y2="157"></line>
<line stroke="currentColor" stroke-dasharray="2 2" stroke-width="1" x1="88" x2="120" y1="157" y2="145"></line>
</svg>
</div>
</div>
</div>
<!-- Foreground Clouds -->
<div class="absolute -bottom-8 -left-4 w-48 h-32 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-white via-white to-transparent opacity-80 blur-md rounded-full"></div>
<div class="absolute -bottom-6 -right-2 w-40 h-24 bg-[radial-gradient(ellipse_at_center,_var(--tw-gradient-stops))] from-pink-50 via-white to-transparent opacity-90 blur-md rounded-full"></div>
<!-- Cloud Shapes (SVG Representation for softer edges) -->
<svg class="absolute -bottom-10 left-0 w-full h-40 text-white/90 drop-shadow-xl" fill="currentColor" viewbox="0 0 200 100" xmlns="http://www.w3.org/2000/svg">
<path d="M50 70a20 20 0 0 1 10-38 30 30 0 0 1 55-5 25 25 0 0 1 40 10 20 20 0 0 1 5 33H50z"></path>
<path d="M20 75a15 15 0 0 1 15-15 20 20 0 0 1 30 0 15 15 0 0 1 10 15H20z" fill="var(--brand-pink-light)" opacity="0.5"></path>
</svg>
<!-- Error Cloud Badge -->
<div class="absolute bottom-2 right-4 transform translate-y-2 z-10">
<div class="relative">
<!-- Red Cloud Shape -->
<svg fill="none" height="48" viewbox="0 0 64 48" width="64" xmlns="http://www.w3.org/2000/svg">
<path d="M44.5 45.5H19.5C9.83502 45.5 2 37.665 2 28C2 19.349 8.27218 12.164 16.5 10.7412C18.6651 4.79632 24.3213 0.5 31 0.5C38.9959 0.5 45.698 6.01256 47.382 13.5042C55.6981 14.1287 62.5 21.0544 62.5 29.5C62.5 38.3366 55.3366 45.5 46.5 45.5H44.5Z" fill="#FF849D"></path>
<path d="M44.5 45.5H19.5C9.83502 45.5 2 37.665 2 28C2 19.349 8.27218 12.164 16.5 10.7412C18.6651 4.79632 24.3213 0.5 31 0.5C38.9959 0.5 45.698 6.01256 47.382 13.5042C55.6981 14.1287 62.5 21.0544 62.5 29.5C62.5 38.3366 55.3366 45.5 46.5 45.5H44.5Z" stroke="white" stroke-width="2"></path>
</svg>
<!-- Exclamation Mark -->
<div class="absolute inset-0 flex flex-col items-center justify-center text-white pb-1">
<div class="w-1.5 h-4 bg-white rounded-full mb-1"></div>
<div class="w-1.5 h-1.5 bg-white rounded-full"></div>
</div>
</div>
</div>
<!-- Decorative Sparkles Background -->
<svg class="absolute inset-0 w-full h-full pointer-events-none text-brand-gold opacity-40" viewbox="0 0 280 280">
<path d="M40 80L42 70L52 68L42 66L40 56L38 66L28 68L38 70Z" fill="currentColor"></path>
<path d="M220 100L221 95L226 94L221 93L220 88L219 93L214 94L219 95Z" fill="currentColor"></path>
<path d="M240 200L242 195L247 194L242 193L240 188L238 193L233 194L238 195Z" fill="currentColor"></path>
</svg>
</div>
<!-- END: Hero Illustration -->
<!-- BEGIN: Typography Section -->
<div class="text-center z-10 w-full max-w-[320px] mb-10">
<h2 class="font-serif-brand text-[28px] leading-[1.2] font-semibold text-brand-dark mb-4">
          Your aura slipped away<br/>for a second. 
          <span class="inline-block translate-y-1">
<svg class="text-brand-gold" fill="none" height="24" viewbox="0 0 24 24" width="24" xmlns="http://www.w3.org/2000/svg">
<path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" fill="currentColor"></path>
</svg>
</span>
</h2>
<p class="text-[15px] text-brand-gray-text font-medium">
          Let's reconnect and try again.
        </p>
</div>
<!-- END: Typography Section -->
<!-- BEGIN: Action Buttons -->
<div class="w-full space-y-4 z-10 mt-auto pb-4">
<!-- Try Again Button -->
<button class="relative w-full h-[60px] bg-btn-gradient text-white rounded-full font-semibold text-[17px] shadow-glow-pink hover:opacity-95 transition-opacity overflow-hidden group">
<!-- Button Sparkles -->
<svg class="absolute left-6 top-1/2 -translate-y-1/2 w-4 h-4 text-white/60 group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 0L13.5 10.5L24 12L13.5 13.5L12 24L10.5 13.5L0 12L10.5 10.5L12 0Z"></path>
</svg>
<span class="relative z-10">Try Again</span>
<svg class="absolute right-6 top-1/2 -translate-y-1/2 w-4 h-4 text-white/60 group-hover:scale-110 transition-transform" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 0L14 10L24 12L14 14L12 24L10 14L0 12L10 10L12 0Z"></path>
</svg>
<!-- Inner Top Highlight for 3D effect -->
<div class="absolute inset-0 rounded-full border-t border-white/30 pointer-events-none"></div>
</button>
<!-- Change Scene Button -->
<button class="w-full h-[60px] bg-white/40 backdrop-blur-sm border border-brand-pink-light rounded-full font-medium text-[16px] text-brand-dark flex items-center justify-center space-x-2 hover:bg-white/60 transition-colors shadow-sm">
<svg class="w-5 h-5 opacity-70" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" stroke-linecap="round" stroke-linejoin="round"></path>
<path d="M15 6h.01M12 4h.01M17 9h.01" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span>Change Scene</span>
</button>
</div>
<!-- END: Action Buttons -->
</section>
<!-- END: Main Content Area -->
<!-- Ambient Bottom Clouds/Fog -->
<div class="absolute bottom-0 left-0 w-full h-48 bg-gradient-to-t from-pink-100/80 to-transparent pointer-events-none mix-blend-overlay"></div>
</main>
<!-- END: Mobile Device Container -->
</body></html>
