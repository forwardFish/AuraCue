<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AuraCue - Saved to Aura Cards</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&amp;family=Inter:wght@400;500&amp;display=swap" rel="stylesheet"/>
<style data-purpose="custom-utilities">
    :root {
      --bg-cream: #FFFDF8;
      --text-brown: #3E3224;
      --text-taupe: #8A8177;
      --gold-primary: #C9A779;
      --gradient-coral: linear-gradient(135deg, #FFA99F 0%, #FF8D8D 100%);
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .device-mockup {
      width: 430px; /* iPhone 14/15 Pro width */
      height: 932px; /* iPhone 14/15 Pro height */
      background-color: var(--bg-cream);
      border-radius: 55px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 14px black, 0 20px 40px rgba(0,0,0,0.5);
      /* Subtle radial glow background */
      background-image: radial-gradient(circle at 50% 40%, rgba(255, 230, 220, 0.4) 0%, transparent 60%);
    }

    /* Font utilities */
    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    /* Custom shadows */
    .shadow-card {
      box-shadow: 0 20px 40px -10px rgba(255, 170, 160, 0.3), 0 10px 20px -5px rgba(0,0,0,0.05);
    }
    
    .shadow-button {
      box-shadow: 0 10px 25px -5px rgba(255, 141, 141, 0.4);
    }

    /* Glow effect for the success checkmark */
    .glow-success {
      filter: drop-shadow(0 0 20px rgba(230, 190, 140, 0.6));
    }
    
    /* Gradient text for logo */
    .text-gradient-gold {
      background: linear-gradient(to right, #B28850, #DCC08C, #B28850);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Dynamic Island (Visual only) */
    .dynamic-island {
      position: absolute;
      top: 11px;
      left: 50%;
      transform: translateX(-50%);
      width: 125px;
      height: 37px;
      background-color: black;
      border-radius: 20px;
      z-index: 50;
    }

    /* Scrollbar hiding */
    .hide-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .hide-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>
<body>
<!-- BEGIN: Device Frame -->
<main class="device-mockup relative flex flex-col hide-scrollbar overflow-y-auto">
<!-- BEGIN: Status Bar -->
<div class="h-14 w-full flex justify-between items-center px-8 pt-3 relative z-40 text-black">
<span class="text-[16px] font-semibold tracking-tight relative top-1">9:41</span>
<div class="flex items-center gap-2 relative top-1">
<!-- Cellular -->
<svg fill="none" height="12" viewbox="0 0 18 12" width="18" xmlns="http://www.w3.org/2000/svg">
<path d="M1 11H3V7H1V11ZM5 11H7V5H5V11ZM9 11H11V3H9V11ZM13 11H15V1H13V11Z" fill="black"></path>
</svg>
<!-- Wi-Fi -->
<svg fill="none" height="12" viewbox="0 0 16 12" width="16" xmlns="http://www.w3.org/2000/svg">
<path d="M8 12L0 3.76923C3.06452 0.589744 12.9355 0.589744 16 3.76923L8 12Z" fill="black"></path>
</svg>
<!-- Battery -->
<svg fill="none" height="12" viewbox="0 0 25 12" width="25" xmlns="http://www.w3.org/2000/svg">
<rect height="11" rx="3.5" stroke="black" width="21" x="0.5" y="0.5"></rect>
<rect fill="black" height="8" rx="2" width="18" x="2" y="2"></rect>
<path d="M24 4V8C24 8 25 7.5 25 6C25 4.5 24 4 24 4Z" fill="black"></path>
</svg>
</div>
</div>
<div class="dynamic-island"></div>
<!-- END: Status Bar -->
<!-- BEGIN: Header -->
<header class="px-6 mt-2 flex items-center justify-between relative z-10">
<button class="w-10 h-10 rounded-full border border-[#E8D9C5] flex items-center justify-center bg-white/50 backdrop-blur-sm">
<svg fill="none" height="14" viewbox="0 0 14 14" width="14" xmlns="http://www.w3.org/2000/svg">
<path d="M1 1L13 13M1 13L13 1" stroke="#5C4D3C" stroke-linecap="round" stroke-width="1.2"></path>
</svg>
</button>
<h1 class="font-serif text-2xl absolute left-1/2 -translate-x-1/2 text-gradient-gold">AuraCue</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<div class="flex-1 flex flex-col items-center px-6 mt-4 relative z-10 pb-6">
<!-- Success Icon -->
<div class="relative mb-4 glow-success">
<!-- Decorative Glow SVG (simplified representation) -->
<svg class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 text-[#EFE4CF]" fill="currentColor" viewbox="0 0 100 100">
<circle cx="50" cy="50" filter="blur(8px)" opacity="0.3" r="40"></circle>
</svg>
<div class="w-[64px] h-[64px] rounded-full border-[3px] border-[#CBAA80] flex items-center justify-center bg-white relative z-10">
<svg fill="none" height="20" viewbox="0 0 32 24" width="28" xmlns="http://www.w3.org/2000/svg">
<path d="M2 12L11 21L30 2" stroke="#CBAA80" stroke-linecap="round" stroke-linejoin="round" stroke-width="4"></path>
</svg>
</div>
</div>
<!-- Text Content -->
<h2 class="font-serif text-[26px] text-[#3E3224] mb-1 text-center">Saved to your Aura Cards</h2>
<p class="text-[14px] text-[#8A8177] mb-5 text-center">Your lucky aura is ready whenever you step out.</p>
<!-- BEGIN: Aura Card -->
<div class="relative w-[280px] h-[360px] mb-6">
<div class="w-full h-full bg-[#FFFBF4] rounded-2xl border border-[#E8D9C5] shadow-card overflow-hidden flex flex-col relative">
<!-- Card Decorative Corners -->
<svg class="absolute top-2 left-2 w-6 h-6 text-[#D5B88D]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M2 2v6h1V3h5V2H2z"></path></svg>
<svg class="absolute top-2 right-2 w-6 h-6 text-[#D5B88D]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M22 2v6h-1V3h-5V2h6z"></path></svg>
<svg class="absolute bottom-2 left-2 w-6 h-6 text-[#D5B88D]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M2 22v-6h1v5h5v1H2z"></path></svg>
<svg class="absolute bottom-2 right-2 w-6 h-6 text-[#D5B88D]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M22 22v-6h-1v5h-5v1h6z"></path></svg>
<!-- Card Header -->
<div class="text-center pt-4 pb-2 relative z-10">
<p class="text-[10px] tracking-widest text-[#B29A78] uppercase mb-1">Today's</p>
<h3 class="font-serif text-[16px] text-[#D0B180] tracking-wider uppercase">Lucky Aura</h3>
</div>
<!-- Card Main Image Area -->
<div class="flex-1 relative flex items-center justify-center">
<div class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(255,200,200,0.4)_0%,transparent_70%)]"></div>
<div class="w-40 h-40 rounded-full border border-[#E8D9C5]/50 relative flex items-center justify-center overflow-hidden">
<img alt="Portrait Art" class="w-full h-full object-cover opacity-80 mix-blend-multiply" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDILcyIVg2umtd5AKesSzMF39nEpTcYzhvpZ1Nno7ou4DZjt1KfXn_sMo836cUrpnPsEOWCTfvq8CqsDnQbSnaUdhlbJ31ONzNNMfpIfHWHrNgYCN-dNgt5xaHWrO-nxfCzzpmNhH4aKCGUJY8lLIWBmL_Wk6fDmC8e0BUvSDUU3Oz8giJKUipn0RqJPjw0eewWCGa1zg2pS9Rw-xNvF0SjGgeUQZ2JT02iMiPjXEaDFfUtGb16ETzW97teVvURIBaWREZxTH-KIWg"/>
</div>
</div>
<!-- Card Footer Info -->
<div class="pb-4 px-4 text-center relative z-10 bg-gradient-to-t from-[#FFFBF4] via-[#FFFBF4] to-transparent">
<h4 class="font-serif text-[20px] text-[#D0B180] mb-1">ROSE AURA</h4>
<p class="text-[10px] text-[#D0B180] mb-3">Love • Confidence • Radiance</p>
<!-- Stats -->
<div class="flex justify-center items-end gap-4 mb-3">
<div class="flex flex-col items-center">
<svg class="w-3.5 h-3.5 mb-1 text-[#D0B180]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
<span class="text-[7px] tracking-wider text-[#A59A8F] uppercase">Energy</span>
<span class="text-[9px] text-[#3E3224]">Bright</span>
</div>
<div class="w-px h-6 bg-[#E8D9C5]"></div>
<div class="flex flex-col items-center">
<svg class="w-3.5 h-3.5 mb-1 text-[#FFA99F]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
<span class="text-[7px] tracking-wider text-[#A59A8F] uppercase">Focus</span>
<span class="text-[9px] text-[#3E3224]">Self-Love</span>
</div>
<div class="w-px h-6 bg-[#E8D9C5]"></div>
<div class="flex flex-col items-center">
<svg class="w-3.5 h-3.5 mb-1 text-[#D0B180]" fill="none" stroke="currentColor" viewbox="0 0 24 24"><path d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path></svg>
<span class="text-[7px] tracking-wider text-[#A59A8F] uppercase">Lucky Color</span>
<span class="text-[9px] text-[#3E3224]">Blush Pink</span>
</div>
</div>
<!-- Date -->
<div class="text-[9px] text-[#B29A78] uppercase tracking-widest flex items-center justify-center gap-2">
<span class="text-[7px]">✦</span> MAY 16, 2024 <span class="text-[7px]">✦</span>
</div>
</div>
</div>
</div>
<!-- END: Aura Card -->
<!-- BEGIN: Status Indicators -->
<div class="w-full flex flex-col gap-2 mb-6 px-2">
<!-- Item 1 -->
<div class="bg-white/60 backdrop-blur-md border border-[#E8D9C5] rounded-2xl p-3.5 flex items-center justify-between">
<div class="flex items-center gap-3">
<svg class="w-5 h-5 text-[#B29A78]" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[14px] text-[#3E3224]">Saved to Photos</span>
</div>
<div class="w-5 h-5 rounded-full bg-[#FF9A9A] flex items-center justify-center">
<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
</div>
</div>
<!-- Item 2 -->
<div class="bg-white/60 backdrop-blur-md border border-[#E8D9C5] rounded-2xl p-3.5 flex items-center justify-between">
<div class="flex items-center gap-3">
<svg class="w-5 h-5 text-[#B29A78]" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 00.95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 00-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 00-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 00-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 00.951-.69l1.519-4.674z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-[14px] text-[#3E3224]">Saved to Aura Cards</span>
</div>
<div class="w-5 h-5 rounded-full bg-[#FF9A9A] flex items-center justify-center">
<svg class="w-3 h-3 text-white" fill="none" stroke="currentColor" stroke-width="3" viewbox="0 0 24 24"><path d="M5 13l4 4L19 7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
</div>
</div>
</div>
<!-- END: Status Indicators -->
<!-- BEGIN: Action Buttons -->
<div class="w-full px-2 flex flex-col gap-3">
<button class="w-full h-[54px] rounded-full shadow-button text-white font-serif text-[16px] flex items-center justify-center gap-2" style="background: var(--gradient-coral);">
          Share Now <span>✦</span>
</button>
<button class="w-full h-[54px] rounded-full border border-[#D5B88D] bg-transparent text-[#B28850] font-serif text-[16px]">
          Back Home
        </button>
</div>
<!-- END: Action Buttons -->
<!-- Link -->
<button class="mt-4 text-[#FF8D8D] text-[13px] flex items-center gap-1">
        View Saved Card <svg class="w-3 h-3" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24"><path d="M9 5l7 7-7 7" stroke-linecap="round" stroke-linejoin="round"></path></svg>
</button>
</div>
<!-- END: Main Content -->
</main>
<!-- END: Device Frame -->
</body></html>
