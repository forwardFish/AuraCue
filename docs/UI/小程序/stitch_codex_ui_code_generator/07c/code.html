<!DOCTYPE html>

<meta charset="utf-8"/>

<title>AuraCue - Friend Invitation</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Poppins:wght@300;400;500;600&display=swap');
    
    body {
      font-family: 'Poppins', sans-serif;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
  </style>
<style data-purpose="background-styles">
    .bg-clouds {
      background: linear-gradient(180deg, #FFF5F4 0%, #FFEBEE 100%);
      position: relative;
      overflow: hidden;
    }
    .bg-clouds::before, .bg-clouds::after {
      content: '';
      position: absolute;
      width: 200vw;
      height: 200vw;
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, rgba(255,255,255,0) 70%);
      border-radius: 50%;
      z-index: 0;
    }
    .bg-clouds::before {
      top: 50%;
      left: -50%;
    }
    .bg-clouds::after {
      top: 70%;
      right: -50%;
    }
  </style>
<style data-purpose="card-styles">
    .aura-card {
      background: linear-gradient(135deg, #A88BEB 0%, #F8CEEC 100%);
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 10px 25px rgba(233, 114, 151, 0.2);
    }
    .aura-card::before {
      content: '';
      position: absolute;
      inset: 4px;
      border: 1px solid rgba(255, 215, 0, 0.6);
      border-radius: 12px;
      z-index: 10;
      pointer-events: none;
    }
    .aura-card-corner {
      position: absolute;
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255, 215, 0, 0.8);
      z-index: 11;
    }
    .aura-card-corner.tl { top: 0; left: 0; border-right: none; border-bottom: none; border-top-left-radius: 14px; }
    .aura-card-corner.tr { top: 0; right: 0; border-left: none; border-bottom: none; border-top-right-radius: 14px; }
    .aura-card-corner.bl { bottom: 0; left: 0; border-right: none; border-top: none; border-bottom-left-radius: 14px; }
    .aura-card-corner.br { bottom: 0; right: 0; border-left: none; border-top: none; border-bottom-right-radius: 14px; }
  </style>
<style data-purpose="button-styles">
    .btn-gradient {
      background: linear-gradient(90deg, #FF758C 0%, #FF7EB3 100%);
      box-shadow: 0 8px 20px rgba(255, 117, 140, 0.4);
    }
  </style>
</head>
