<script>

      theme: {

            serif: ['"Playfair Display"', 'serif'],

          colors: {
            brand: {
              gold: '#D4AF37',

      min-height: 100vh;
      color: #2A1A4A;
      overflow-x: hidden;

    .star-icon {
      position: absolute;
      color: #D4AF37;
      opacity: 0.8;
    }

    /* iOS Safe Area Utilities */
    .pt-safe { padding-top: env(safe-area-inset-top, 44px); }
    .pb-safe { padding-bottom: env(safe-area-inset-bottom, 34px); }

    /* Card Styling */
    .aura-card {
      box-shadow: 0 10px 30px rgba(0,0,0,0.15), 0 0 20px rgba(212, 175, 55, 0.2);
      border: 1px solid rgba(212, 175, 55, 0.5);
    }

    .inner-border {
      border: 1px solid rgba(212, 175, 55, 0.3);
      border-radius: inherit;
    }

    .text-gradient-gold {
      background: linear-gradient(90deg, #D4AF37 0%, #F9E596 50%, #D4AF37 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

      background: linear-gradient(90deg, #2A1A4A 0%, #5D4B8A 100%);
