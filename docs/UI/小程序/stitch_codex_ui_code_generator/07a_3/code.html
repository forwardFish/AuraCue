<!DOCTYPE html>

<html lang="en"><head>

<title>Invite Friends</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap');
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
    }
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
  </style>
<style data-purpose="custom-gradients">
    .bg-main {
      background: linear-gradient(180deg, #FFF6F0 0%, #FFF0E8 100%);
    }
    .btn-primary {
      background: linear-gradient(90deg, #FF7B9B 0%, #FF4D79 100%);
      box-shadow: 0px 8px 16px -4px rgba(255, 77, 121, 0.40), inset 0px -2px 4px rgba(0, 0, 0, 0.10), inset 0px 2px 4px rgba(255, 255, 255, 0.30);
    }
    .btn-secondary {
      background: rgba(255, 255, 255, 0.50);
      border: 1px solid rgba(255, 77, 121, 0.20);
      box-shadow: 0px 4px 8px -2px rgba(255, 77, 121, 0.10);
    }
    .card-list {
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.80) 0%, rgba(255, 255, 255, 0.40) 100%);
      border: 1px solid rgba(255, 220, 200, 0.5);
    }
    .text-gradient {
      background: linear-gradient(90deg, #FF6B8B 0%, #FF8E9C 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-fill-color: transparent;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              dark: '#1C2938',
              pink: '#FF4D79',
              lightPink: '#FF8E9C',
              cream: '#FFF6F0'
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black flex items-center justify-center min-h-screen p-4">
<!-- Mobile Container -->
<div class="bg-main w-full max-w-[430px] h-[932px] rounded-[40px] overflow-hidden relative shadow-2xl flex flex-col">
<!-- BEGIN: Header -->
<header class="pt-14 px-6 flex items-center justify-between z-10 relative">
<button class="w-10 h-10 flex items-center justify-center text-brand-dark">
<i class="fa-solid fa-chevron-left text-xl"></i>
</button>
<div class="flex items-center space-x-1 opacity-0">

</div>

<!-- END: Header -->

<span class="text-gradient">full Aura Card</span>

<div class="relative w-20 h-20 rounded-full border-2 border-dashed border-brand-lightPink/50 bg-white/50 flex items-center justify-center transform -rotate-12 translate-y-4">
<i class="fa-solid fa-user-plus text-brand-lightPink/50 text-xl"></i>
</div>
<!-- Avatar 2 (Filled) -->
<div class="relative w-24 h-24 rounded-full border-[3px] border-white shadow-lg bg-blue-100 z-10 overflow-hidden transform -translate-y-2">

<div class="relative w-20 h-20 rounded-full border-2 border-dashed border-brand-lightPink/50 bg-white/50 flex items-center justify-center transform rotate-12 translate-y-4">
<i class="fa-solid fa-user-plus text-brand-lightPink/50 text-xl"></i>
</div>
</div>
</section>
<!-- Progress Section -->

<p class="text-center text-brand-dark font-medium mb-3 text-[15px]">1 of 3 friends joined</p>
<div class="relative max-w-[240px] mx-auto h-1 bg-brand-lightPink/20 rounded-full flex items-center justify-between px-[10px]">
<!-- Active Line -->
<div class="absolute left-0 top-0 bottom-0 bg-brand-pink rounded-full w-[33%]"></div>
<!-- Dots -->
<div class="w-5 h-5 rounded-full bg-brand-pink border-4 border-white shadow-sm z-10 -ml-[10px]"></div>
<div class="w-4 h-4 rounded-full bg-white border-2 border-brand-lightPink/30 shadow-sm z-10"></div>

<div class="w-6 flex justify-center mr-3 text-brand-pink">
<i class="fa-solid fa-lock text-sm"></i>

<div class="h-px w-full bg-brand-lightPink/10"></div>
<li class="flex items-center text-brand-dark text-[15px]">
<div class="w-6 flex justify-center mr-3 text-brand-pink">
<i class="fa-solid fa-shirt text-sm"></i>
</div>
            Outfit &amp; color guide
          </li>
<div class="h-px w-full bg-brand-lightPink/10"></div>
<li class="flex items-center text-brand-dark text-[15px]">
<div class="w-6 flex justify-center mr-3 text-brand-pink">
<i class="fa-solid fa-comment-dots text-sm"></i>
</div>
            Social action plan
          </li>
<div class="h-px w-full bg-brand-lightPink/10"></div>
<li class="flex items-center text-brand-dark text-[15px]">
<div class="w-6 flex justify-center mr-3 text-brand-pink">
<i class="fa-solid fa-sparkles text-sm"></i>
</div>
            Lucky ritual
          </li>
<div class="h-px w-full bg-brand-lightPink/10"></div>
<li class="flex items-center text-brand-dark text-[15px]">
<div class="w-6 flex justify-center mr-3 text-brand-pink">
<i class="fa-regular fa-image text-sm"></i>
</div>

          </li>
</ul>

<!-- CTAs -->
<section class="mt-auto space-y-4 z-20 pb-4">
<button class="btn-primary w-full py-4 rounded-full text-white font-semibold text-[17px] flex items-center justify-center space-x-2 transition-transform active:scale-95">
<i class="fa-solid fa-user-group text-lg"></i>
<span>Invite Friends</span>
</button>
<button class="btn-secondary w-full py-4 rounded-full text-brand-dark font-medium text-[16px] transition-transform active:scale-95">
          Unlock for <span class="text-brand-pink font-semibold">$1.99</span>
</button>
</section>
<!-- Footer Note -->
<footer class="text-center text-gray-400 text-xs mt-2 mb-2 z-20 flex justify-center items-center">
<i class="fa-solid fa-lock text-[10px] mr-1.5"></i>
        Secure &amp; private. Friends won't see your reading.
      </footer>
</main>
<!-- END: Main Content -->
<!-- Background Sparkles (Decorative) -->
<div class="absolute inset-0 pointer-events-none overflow-hidden z-0">
<i class="fa-solid fa-sparkle text-brand-lightPink/30 absolute top-[20%] left-[10%] text-sm"></i>
<i class="fa-solid fa-sparkle text-brand-lightPink/30 absolute top-[30%] right-[15%] text-xs"></i>
<i class="fa-solid fa-sparkle text-brand-lightPink/30 absolute top-[55%] left-[5%] text-xs"></i>
<i class="fa-solid fa-sparkle text-brand-lightPink/30 absolute top-[60%] right-[5%] text-sm"></i>

<style>
    /* Hide scrollbar for Chrome, Safari and Opera */
