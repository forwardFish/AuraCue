<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AuraCue - Save Success</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&amp;family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            'serif': ['Cinzel', 'serif'],
            'sans': ['Inter', 'sans-serif'],
          },
          colors: {
            'aura-cream': '#FDF9F2',
            'aura-gold': '#C8A97E',
            'aura-gold-light': '#E8D4B4',
            'aura-gold-dark': '#8E6E41',
            'aura-pink': '#FFA09E',
            'aura-pink-light': '#FFC4C2',
            'aura-text': '#4A3B2C',
            'aura-text-light': '#7A6B5C',
          },
          backgroundImage: {
            'gradient-primary': 'linear-gradient(135deg, #FFB5B3 0%, #FF8F8D 100%)',
            'glow-effect': 'radial-gradient(circle, rgba(255,223,179,0.4) 0%, rgba(253,249,242,0) 70%)',
            'glow-pink': 'radial-gradient(circle, rgba(255,160,158,0.2) 0%, rgba(253,249,242,0) 70%)',
          },
          boxShadow: {
            'card': '0 10px 30px -10px rgba(139, 94, 60, 0.2)',
            'button': '0 4px 14px 0 rgba(255, 160, 158, 0.39)',
          }
        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Subtle pulsing effect for the glowing checkmark */
    @keyframes pulse-glow {
      0%, 100% { transform: scale(1); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
    }
    .animate-glow {
      animation: pulse-glow 3s ease-in-out infinite;
    }
  </style>
</head>
<body class="bg-aura-cream font-sans text-aura-text antialiased min-h-screen flex flex-col relative overflow-hidden selection:bg-aura-pink-light selection:text-white">
<!-- Background Glow Effects -->
<div class="absolute top-20 left-1/2 -translate-x-1/2 w-96 h-96 bg-glow-effect rounded-full pointer-events-none mix-blend-screen z-0 animate-glow"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-glow-pink rounded-full pointer-events-none mix-blend-screen z-0"></div>
<!-- BEGIN: Header -->
<header class="relative z-10 w-full pt-14 pb-4 px-6 flex items-center justify-between">
<!-- Close Button -->
<button aria-label="Close" class="w-10 h-10 flex items-center justify-center rounded-full border border-aura-gold-light/40 bg-white/50 backdrop-blur-sm text-aura-text hover:bg-white/80 transition-colors">
<svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M6 18L18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Logo -->
<div class="absolute left-1/2 -translate-x-1/2 flex items-center gap-1">
<span class="font-serif text-2xl tracking-wide text-aura-gold-dark font-medium">AuraCue</span>
<svg class="w-4 h-4 text-aura-gold" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6L12 2z"></path>
</svg>
</div>
<!-- Empty placeholder for flex alignment -->
<div class="w-10"></div>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<main class="relative z-10 flex-grow flex flex-col items-center px-6 pt-6 pb-12 w-full max-w-md mx-auto">
<!-- Success Indicator -->
<div class="relative w-24 h-24 mb-6 flex items-center justify-center">
<!-- Outer glowing rings -->
<div class="absolute inset-0 rounded-full border-2 border-aura-gold/30 animate-[spin_10s_linear_infinite]"></div>
<div class="absolute inset-2 rounded-full border border-aura-gold/50 border-dashed animate-[spin_15s_linear_infinite_reverse]"></div>
<!-- Inner checkmark circle -->
<div class="relative w-16 h-16 rounded-full bg-white shadow-[0_0_20px_rgba(200,169,126,0.4)] flex items-center justify-center z-10">
<svg class="w-8 h-8 text-aura-gold" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M19.916 4.626a.75.75 0 01.208 1.04l-9 13.5a.75.75 0 01-1.154.114l-6-6a.75.75 0 011.06-1.06l5.353 5.353 8.493-12.739a.75.75 0 011.04-.208z" fill-rule="evenodd"></path>
</svg>
</div>
<!-- Little sparkles -->
<svg class="absolute -top-2 -right-2 w-4 h-4 text-aura-gold animate-pulse" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6L12 2z"></path></svg>
<svg class="absolute -bottom-1 -left-3 w-3 h-3 text-aura-gold animate-pulse" fill="currentColor" style="animation-delay: 1s;" viewbox="0 0 24 24"><path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6L12 2z"></path></svg>
</div>
<!-- Title & Subtitle -->
<h1 class="font-serif text-3xl text-center text-aura-text mb-2">Saved to your Aura Cards</h1>
<p class="text-aura-text-light text-sm text-center mb-10">Your lucky aura is ready whenever you step out.</p>
<!-- Aura Card Preview -->
<div class="relative mb-10">
<!-- Decorative sparkles around the card -->
<svg class="absolute -left-8 top-1/4 w-5 h-5 text-aura-gold/60" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6L12 2z"></path></svg>
<svg class="absolute -right-10 top-1/3 w-4 h-4 text-aura-gold/60" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6L12 2z"></path></svg>
<!-- The Card -->
<div class="w-[240px] h-[360px] bg-white rounded-xl shadow-card border border-aura-gold-light/40 overflow-hidden relative">
<!-- Placeholder for the actual card image -->
<img alt="Rose Aura Card Preview" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBY4no1sG5bmG0Ol6yJe9-FMcI5dUu-J57CYhH4AkPes44GPHxi6PU1CbnmcQHjwRt2rMfAfRn4yT2qXIVuBJJiZLyRlgHoxeiyXrGo4rtWcL2-BwcHE-F4XA4e4ryX87_TguKltiwwfrNlK41uFnS9doDFzX1OdexRiTxpFNpdgiuCC09X2ROctTPyBmNap2IXVzjfEM4711Z1_CqJjm4xLKQw39fW8V_bmT09XZk65jrni7adjn9wYaGEfK1tNUpe1lSYhbco"/>
<!-- Recreating the card inner styling subtly over the placeholder for fidelity -->
<div class="absolute inset-0 p-3 pointer-events-none">
<div class="w-full h-full border border-aura-gold/30 rounded-lg flex flex-col items-center p-4">
<div class="absolute top-2 left-2 w-2 h-2 border-t border-l border-aura-gold"></div>
<div class="absolute top-2 right-2 w-2 h-2 border-t border-r border-aura-gold"></div>
<div class="absolute bottom-2 left-2 w-2 h-2 border-b border-l border-aura-gold"></div>
<div class="absolute bottom-2 right-2 w-2 h-2 border-b border-r border-aura-gold"></div>
</div>
</div>
</div>
</div>
<!-- Status Checklist -->
<div class="w-full space-y-3 mb-10">
<!-- Row 1: Photos -->
<div class="flex items-center justify-between px-5 py-3.5 bg-white/60 backdrop-blur-md rounded-2xl border border-aura-gold-light/30 shadow-sm">
<div class="flex items-center gap-3">
<svg class="w-5 h-5 text-aura-text-light" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-aura-text text-[15px]">Saved to Photos</span>
</div>
<div class="w-5 h-5 rounded-full bg-aura-pink flex items-center justify-center text-white">
<svg class="w-3.5 h-3.5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
<!-- Row 2: Aura Cards -->
<div class="flex items-center justify-between px-5 py-3.5 bg-white/60 backdrop-blur-md rounded-2xl border border-aura-gold-light/30 shadow-sm">
<div class="flex items-center gap-3">
<svg class="w-5 h-5 text-aura-text-light" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0111.186 0z" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
<span class="text-aura-text text-[15px]">Saved to Aura Cards</span>
</div>
<div class="w-5 h-5 rounded-full bg-aura-pink flex items-center justify-center text-white">
<svg class="w-3.5 h-3.5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M16.704 4.153a.75.75 0 01.143 1.052l-8 10.5a.75.75 0 01-1.127.075l-4.5-4.5a.75.75 0 011.06-1.06l3.894 3.893 7.48-9.817a.75.75 0 011.05-.143z" fill-rule="evenodd"></path>
</svg>
</div>
</div>
</div>
<!-- Actions -->
<div class="w-full space-y-4">
<button class="w-full py-4 rounded-full bg-gradient-primary text-white font-serif text-lg tracking-wide shadow-button hover:opacity-95 transition-opacity flex items-center justify-center gap-2">
        Share Now
        <svg class="w-4 h-4 text-white" fill="currentColor" viewbox="0 0 24 24"><path d="M12 2l2.4 7.6H22l-6.2 4.5 2.4 7.6L12 17.2l-6.2 4.5 2.4-7.6L2 9.6h7.6L12 2z"></path></svg>
</button>
<button class="w-full py-4 rounded-full bg-white border border-aura-gold-light/60 text-aura-gold-dark font-serif text-lg tracking-wide hover:bg-gray-50 transition-colors">
        Back Home
      </button>
</div>
<!-- Footer Link -->
<a class="mt-8 text-aura-pink text-sm flex items-center gap-1 hover:underline" href="#">
      View Saved Card
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" stroke-width="2" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M8.25 4.5l7.5 7.5-7.5 7.5" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</a>
</main>
<!-- END: Main Content -->
</body></html>
