<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            aura: {
              navy: '#1A2340',
              gold: '#C5A070',

<style data-purpose="background-atmosphere">
    body {
      background: radial-gradient(circle at 50% 50%, #FFF5ED 0%, #FDF9F3 100%);
      min-height: 100vh;
      overflow-x: hidden;
    }
    .ethereal-glow {
      background: radial-gradient(circle, rgba(235, 178, 126, 0.2) 0%, rgba(253, 249, 243, 0) 70%);
      position: absolute;
      width: 150%;
      height: 100%;
      top: 10%;
      left: -25%;
      z-index: 0;
      pointer-events: none;
    }
    .card-base-glow {
      background: radial-gradient(ellipse at center, rgba(255, 235, 180, 0.6) 0%, rgba(255, 255, 255, 0) 70%);
      height: 100px;
      width: 300px;
      margin-top: -50px;
      filter: blur(15px);
    }
    /* Animated sparkle elements simulation */
    .sparkle {
      position: absolute;
      opacity: 0.6;
      pointer-events: none;
    }

<body class="font-sans text-aura-text antialiased">
<!-- BEGIN: Ethereal Atmosphere Background -->
<div class="ethereal-glow"></div>
<!-- END: Ethereal Atmosphere Background -->

<svg class="h-6 w-6 text-aura-gold" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<!-- END: Top Navigation Bar -->
<!-- BEGIN: Hero Content Section -->
<main class="flex-1 flex flex-col items-center px-8 pt-4">
<!-- Decorative Star -->
<div class="mb-2">
<svg class="text-aura-gold opacity-60" fill="none" height="24" viewbox="0 0 24 24" width="24">
<path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z" fill="currentColor"></path>
</svg>
</div>

        Drawing your<br/>
<span class="font-bold">Lucky <span class="italic text-aura-gold/80">Aura Card...</span></span>
</h2>
<p class="mt-3 text-aura-muted text-sm text-center">
        Matching your scene, energy, and today's vibe. <span class="inline-block">💖</span>
</p>
<!-- BEGIN: Tarot Card Ritual Container -->
<div class="relative mt-12 mb-8 flex flex-col items-center" data-purpose="ritual-animation-area">
<!-- Floating Celestial Orbits -->
<div class="absolute inset-0 -top-10 -bottom-10 -left-10 -right-10 pointer-events-none">
<svg class="opacity-30" fill="none" height="100%" viewbox="0 0 400 500" width="100%">
<ellipse cx="200" cy="250" rx="180" ry="80" stroke="#C5A070" stroke-dasharray="4 4" stroke-width="1" transform="rotate(-15 200 250)"></ellipse>
<ellipse cx="200" cy="250" rx="150" ry="120" stroke="#C5A070" stroke-dasharray="2 6" stroke-width="1" transform="rotate(10 200 250)"></ellipse>

<path d="M300 185 A 15 15 0 1 1 300 215" stroke="#C5A070" stroke-width="1.5"></path> <!-- Moon sliver -->
</svg>
</div>

</div>
<!-- Glow Base beneath card -->
<div class="card-base-glow z-10"></div>
<!-- Ripple Effect under card -->
<div class="absolute bottom-4 w-48 h-12 border border-aura-gold/30 rounded-[100%] opacity-40"></div>
<div class="absolute bottom-2 w-56 h-16 border border-aura-gold/20 rounded-[100%] opacity-20"></div>
</div>
<!-- END: Tarot Card Ritual Container -->
<!-- BEGIN: Progress Stepper -->
<div class="w-full max-w-sm bg-white/40 backdrop-blur-sm rounded-3xl p-6 shadow-sm border border-white/50 mb-6">
<div class="flex items-center justify-between relative">
<!-- Connector Lines -->
<div class="absolute top-5 left-[15%] right-[15%] h-[2px] bg-aura-gold/20">
<div class="h-full bg-aura-gold w-1/3"></div> <!-- Progress fill -->
</div>
<!-- Step 1: Active -->
<div class="relative z-10 flex flex-col items-center w-1/3">
<div class="w-10 h-10 rounded-full bg-white border-2 border-aura-gold flex items-center justify-center text-aura-gold shadow-sm">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path clip-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" fill-rule="evenodd"></path>
</svg>

</div>
<!-- Step 2 -->
<div class="relative z-10 flex flex-col items-center w-1/3">
<div class="w-10 h-10 rounded-full bg-white border-2 border-gray-100 flex items-center justify-center text-aura-navy/60 shadow-sm">
<svg fill="currentColor" height="20" viewbox="0 0 24 24" width="20">
<path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z"></path>

<span class="mt-2 text-[10px] font-medium text-aura-muted text-center leading-tight">Aligning your<br/>energy</span>
</div>
<!-- Step 3 -->
<div class="relative z-10 flex flex-col items-center w-1/3">
<div class="w-10 h-10 rounded-full bg-white border-2 border-gray-100 flex items-center justify-center text-aura-navy/60 shadow-sm">
<svg class="h-5 w-5" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
</svg>
</div>
<span class="mt-2 text-[10px] font-medium text-aura-muted text-center leading-tight">Revealing your<br/>cues</span>
</div>
</div>
</div>
<!-- END: Progress Stepper -->
<div class="flex flex-col items-center gap-1 mb-8">
<p class="text-aura-muted text-xs flex items-center gap-1">
<svg class="text-aura-gold" fill="currentColor" height="12" viewbox="0 0 24 24" width="12">
<path d="M12 0L14.5 9.5L24 12L14.5 14.5L12 24L9.5 14.5L0 12L9.5 9.5L12 0Z"></path>
</svg>
          This takes a few seconds.
        </p>
<p class="text-aura-muted text-xs">Good things are unfolding. 💛</p>
</div>
</main>
<!-- END: Hero Content Section -->
<!-- BEGIN: Bottom Navigation -->
<nav class="bg-white/80 backdrop-blur-lg border-t border-gray-100 pb-8 pt-3 px-6 flex justify-around items-center" data-purpose="tab-bar">
<div class="flex flex-col items-center gap-1">
<div class="text-aura-gold">
<svg class="h-6 w-6" fill="currentColor" viewbox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
<path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"></path>
</svg>
</div>
<span class="text-[10px] font-semibold text-aura-gold">Home</span>
</div>
<div class="flex flex-col items-center gap-1">
<div class="text-aura-muted/40">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

<div class="flex flex-col items-center gap-1">
<div class="text-aura-muted/40">
<svg class="h-6 w-6" fill="none" stroke="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
<path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>

<span class="text-[10px] font-medium text-aura-muted">Profile</span>
</div>
</nav>
<!-- END: Bottom Navigation -->
<!-- iOS Home Indicator -->
<div class="h-1.5 w-32 bg-black/20 rounded-full mx-auto mb-2"></div>
</div>
<script data-purpose="interaction-effects">
    // Subtle float animation for the card using JS to keep it lightweight
    const card = document.querySelector('[data-purpose="tarot-card"]');
    let angle = 0;
    
    function animate() {
      angle += 0.02;
      const yOffset = Math.sin(angle) * 8;
      if (card) {
        card.style.transform = `translateY(${yOffset}px)`;
      }
      requestAnimationFrame(animate);
    }
    
    animate();
  </script>
</body></html>
