<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@400;500;600&display=swap');

    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #fce7f3; /* Fallback */
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .font-serif {
      font-family: 'Playfair Display', serif;
    }

    /* Custom Gradient Background */
    .bg-magical {
      background: radial-gradient(circle at 50% 40%, rgba(255, 230, 235, 0.8) 0%, rgba(243, 218, 235, 0.9) 30%, rgba(230, 205, 225, 0.95) 60%, rgba(253, 237, 237, 1) 100%);
    }

    /* Text Gradient */
    .text-gradient {
      background: linear-gradient(90deg, #d2797e 0%, #e2a099 50%, #d8a07c 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    /* Card Glow */
    .card-glow {
      box-shadow: 0 0 60px 10px rgba(255, 255, 255, 0.6), 0 0 100px 20px rgba(255, 220, 180, 0.3);
    }
    
    /* Orbit Lines */
    .orbit-1 {
      position: absolute;
      width: 120%;
      height: 60%;
      border: 1px solid rgba(255, 255, 255, 0.4);
      border-radius: 50%;
      top: 20%;
      left: -10%;
      transform: rotate(-15deg);
      pointer-events: none;
    }
    .orbit-2 {
      position: absolute;
      width: 140%;
      height: 70%;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 50%;
      top: 15%;
      left: -20%;
      transform: rotate(10deg);
      pointer-events: none;
    }

    /* Sparkles */
    .sparkle {
      position: absolute;
      background: radial-gradient(circle, #fff 20%, transparent 80%);
      border-radius: 50%;
      opacity: 0.8;
    }
    
    .sparkle-cross {
      position: absolute;
      width: 2px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, #fff, transparent);
      left: 50%;
      transform: translateX(-50%);
    }
    
    .sparkle-cross:before {
      content: '';
      position: absolute;
      width: 100%;
      height: 2px;
      background: linear-gradient(to right, transparent, #fff, transparent);
      top: 50%;
      left: -50%;
      transform: translateY(-50%) rotate(90deg);
    }

    /* Progress Line */
    .progress-line-bg {
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 2px;
      background-color: #e5d5db;
      z-index: 0;
    }
    
    .progress-line-active {
      position: absolute;
      top: 50%;
      left: 10%;
      width: 20%; /* Adjust based on active state */
      height: 2px;
      background-color: #d19a6a;
      z-index: 0;
    }
  </style>
</head>
