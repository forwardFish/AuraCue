<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AuraCue - Card Draw</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }
    
    .font-serif {
      font-family: 'Playfair Display', serif;
    }
  </style>
<style data-purpose="background-animations">
    .bg-mesh {
      background: radial-gradient(circle at 50% 80%, #ffd1d1 0%, transparent 50%),
                  radial-gradient(circle at 20% 30%, #fff0f0 0%, transparent 40%),
                  radial-gradient(circle at 80% 20%, #fef3f3 0%, transparent 40%),
                  linear-gradient(180deg, #fffcfb 0%, #fae6e6 50%, #f6e1e1 100%);
    }
    
    .glow-effect {
      box-shadow: 0 0 40px 10px rgba(255, 255, 255, 0.6);
    }
    
    .button-gradient {
      background: linear-gradient(90deg, #8b5cf6 0%, #d946ef 50%, #f87171 100%);
      box-shadow: 0 10px 25px -5px rgba(217, 70, 239, 0.4), inset 0 2px 4px rgba(255,255,255,0.3);
    }

    .card-bg {
      background: linear-gradient(135deg, rgba(255,255,255,0.9) 0%, rgba(255,230,235,0.7) 100%);
      backdrop-filter: blur(10px);
      box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1), inset 0 1px 2px rgba(255,255,255,0.8);
    }

    .shimmer {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(45deg, transparent 45%, rgba(255,255,255,0.4) 50%, transparent 55%);
      background-size: 200% 200%;
      animation: shimmer 3s infinite linear;
      pointer-events: none;
    }

    @keyframes shimmer {
      0% { background-position: -100% 100%; }
      100% { background-position: 100% -100%; }
    }
    
    .float {
      animation: float 6s ease-in-out infinite;
    }
    
    .float-delayed-1 {
      animation: float 6s ease-in-out 1s infinite;
    }
    
    .float-delayed-2 {
      animation: float 6s ease-in-out 2s infinite;
    }

    @keyframes float {
      0% { transform: translateY(0px) rotate(var(--rotation, 0deg)); }
      50% { transform: translateY(-10px) rotate(var(--rotation, 0deg)); }
      100% { transform: translateY(0px) rotate(var(--rotation, 0deg)); }
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'aura-navy': '#1e1b4b',
            'aura-gold': '#d4af37',
            'aura-peach': '#ffedd5',
            'aura-rose': '#ffe4e6',
          }
        }
      }
    }
  </script>
</head>
<body class="bg-mesh min-h-screen text-aura-navy antialiased flex justify-center overflow-x-hidden">
<main class="w-full max-w-md relative flex flex-col h-screen max-h-[900px] shadow-2xl overflow-hidden bg-white/20">
<!-- Decorative Stars Background -->
<div class="absolute inset-0 pointer-events-none z-0">
<div class="absolute top-40 left-10 text-white/60">✦</div>
<div class="absolute top-60 right-20 text-white/40 text-sm">✦</div>
<div class="absolute bottom-1/3 left-20 text-white/50 text-xs">✦</div>
<div class="absolute top-1/4 right-10 text-yellow-200/40 text-xl">✨</div>
</div>
<!-- BEGIN: Header -->
<header class="flex justify-between items-center p-6 relative z-10 pt-10">
<!-- Back Button -->
<button aria-label="Go back" class="w-12 h-12 rounded-full bg-white/60 backdrop-blur-md flex items-center justify-center shadow-sm border border-white/40 text-aura-gold hover:bg-white/80 transition">
<svg fill="none" height="24" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="24">
<path d="M12 2L12 22M2 12L22 12M5 5L19 19M19 5L5 19"></path>
</svg>
</button>
<!-- Logo -->
<div class="flex flex-col items-center">
<svg class="w-10 h-10 text-aura-navy mb-1" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1" viewbox="0 0 24 24">
<path d="M12 2c0 0-4 6-4 10a4 4 0 0 0 8 0c0-4-4-10-4-10Z"></path>
<path d="M12 22c0 0 6-4 10-4a4 4 0 0 0 0-8c-4 0-10 4-10 4Z"></path>
<path d="M12 22c0 0-6-4-10-4a4 4 0 0 1 0-8c4 0 10 4 10 4Z"></path>
</svg>
<h1 class="font-serif text-lg tracking-widest uppercase font-semibold text-aura-navy">AuraCue</h1>
<div class="flex items-center gap-2 mt-1">
<div class="h-[1px] w-8 bg-aura-gold/50"></div>
<span class="text-aura-gold text-xs">✦</span>
<div class="h-[1px] w-8 bg-aura-gold/50"></div>
</div>
</div>
<!-- Gift Button -->
<button aria-label="Gifts" class="w-12 h-12 rounded-full bg-white/60 backdrop-blur-md flex items-center justify-center shadow-sm border border-white/40 text-aura-navy hover:bg-white/80 transition">
<svg fill="none" height="20" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24" width="20">
<polyline points="20 12 20 22 4 22 4 12"></polyline>
<rect height="5" width="20" x="2" y="7"></rect>
<line x1="12" x2="12" y1="22" y2="7"></line>
<path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"></path>
<path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"></path>
</svg>
</button>
</header>
<!-- END: Header -->
<!-- BEGIN: Main Content -->
<section class="flex-1 flex flex-col items-center px-6 relative z-10 pt-4 pb-24">
<!-- Text Copy -->
<div class="text-center mb-8 relative">
<h2 class="font-serif text-4xl leading-tight text-aura-navy mb-3 relative inline-block">
          Choose the card<br/>that calls you.
          <span class="absolute -top-4 -right-6 text-pink-300 text-xl">✦</span>
<span class="absolute top-2 -right-8 text-pink-300/60 text-sm">✦</span>
</h2>
<p class="text-gray-600 text-sm font-medium tracking-wide">
          Take one breath. Let today's aura find you.
        </p>
</div>
<!-- Cards Container -->
<div class="relative w-full h-80 flex items-center justify-center mb-10 perspective-1000">
<!-- Glowing Base -->
<div class="absolute bottom-[-20px] w-64 h-10 bg-white/60 rounded-[100%] blur-xl glow-effect z-0"></div>
<div class="absolute bottom-0 w-48 h-2 border border-white/50 rounded-[100%] shadow-[0_0_15px_rgba(255,255,255,0.8)] z-0"></div>
<!-- Card I (Left) -->
<div class="absolute left-2 w-32 h-56 rounded-xl border border-white/60 card-bg p-2 float-delayed-1 transform -rotate-12 origin-bottom-right z-10 shadow-lg cursor-pointer hover:-translate-y-2 transition-transform duration-300" style="--rotation: -12deg;">
<div class="w-full h-full border border-aura-gold/30 rounded-lg flex flex-col items-center justify-between p-3 relative overflow-hidden">
<span class="text-aura-gold text-xs">✦</span>
<span class="font-serif text-aura-gold/70 text-xs tracking-widest mt-1">AURA</span>
<div class="relative flex-1 flex items-center justify-center w-full">
<!-- Starburst center -->
<div class="w-16 h-16 rounded-full border border-aura-gold/20 flex items-center justify-center relative">
<div class="absolute inset-0 border border-aura-gold/10 rounded-full scale-110"></div>
<svg class="w-10 h-10 text-aura-gold drop-shadow-md" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2L14 9L21 12L14 15L12 22L10 15L3 12L10 9L12 2Z"></path>
</svg>
</div>
</div>
<span class="font-serif text-aura-navy text-sm mb-2">Card I</span>
</div>
</div>
<!-- Card II (Center, Active) -->
<div class="absolute w-44 h-72 rounded-2xl border-2 border-white/80 card-bg p-2 float z-30 shadow-2xl cursor-pointer hover:scale-105 transition-transform duration-300">
<div class="shimmer rounded-xl"></div>
<div class="w-full h-full border border-aura-gold/40 rounded-xl flex flex-col items-center justify-between p-4 relative overflow-hidden bg-gradient-to-b from-white/40 to-transparent">
<!-- Corner Accents -->
<div class="absolute top-2 left-2 text-aura-gold/50 text-[10px]">✦</div>
<div class="absolute top-2 right-2 text-aura-gold/50 text-[10px]">✦</div>
<div class="absolute bottom-2 left-2 text-aura-gold/50 text-[10px]">✦</div>
<div class="absolute bottom-2 right-2 text-aura-gold/50 text-[10px]">✦</div>
<span class="text-aura-gold text-sm mt-1">✦</span>
<span class="font-serif text-aura-gold text-sm tracking-widest mt-1 font-medium">AURA</span>
<div class="relative flex-1 flex items-center justify-center w-full my-4">
<!-- Elaborate Starburst -->
<div class="w-24 h-24 rounded-full border border-aura-gold/30 flex items-center justify-center relative">
<!-- Outer Dashed Ring -->
<svg class="absolute inset-0 w-full h-full text-aura-gold/20" viewbox="0 0 100 100">
<circle cx="50" cy="50" fill="none" r="48" stroke="currentColor" stroke-dasharray="2 4" stroke-width="0.5"></circle>
</svg>
<!-- Inner Solid Ring -->
<div class="absolute inset-2 border border-aura-gold/20 rounded-full"></div>
<!-- Rays -->
<div class="absolute inset-0 bg-[radial-gradient(circle,transparent_40%,rgba(212,175,55,0.1)_100%)] rounded-full"></div>
<!-- Main Star -->
<svg class="w-16 h-16 text-[#d4af37] drop-shadow-xl" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 1L14.5 9.5L23 12L14.5 14.5L12 23L9.5 14.5L1 12L9.5 9.5L12 1Z" opacity="0.8"></path>
<path d="M12 3L13.5 10.5L21 12L13.5 13.5L12 21L10.5 13.5L3 12L10.5 10.5L12 3Z" fill="#fef08a"></path>
</svg>
</div>
</div>
<span class="font-serif text-aura-navy text-xl mb-3">Card II</span>
</div>
</div>
<!-- Card III (Right) -->
<div class="absolute right-2 w-32 h-56 rounded-xl border border-white/60 card-bg p-2 float-delayed-2 transform rotate-12 origin-bottom-left z-10 shadow-lg cursor-pointer hover:-translate-y-2 transition-transform duration-300" style="--rotation: 12deg;">
<div class="w-full h-full border border-aura-gold/30 rounded-lg flex flex-col items-center justify-between p-3 relative overflow-hidden">
<span class="text-aura-gold text-xs">✦</span>
<span class="font-serif text-aura-gold/70 text-xs tracking-widest mt-1">AURA</span>
<div class="relative flex-1 flex items-center justify-center w-full">
<!-- Starburst center -->
<div class="w-16 h-16 rounded-full border border-aura-gold/20 flex items-center justify-center relative">
<div class="absolute inset-0 border border-aura-gold/10 rounded-full scale-110"></div>
<svg class="w-10 h-10 text-aura-gold drop-shadow-md" fill="currentColor" viewbox="0 0 24 24">
<path d="M12 2L14 9L21 12L14 15L12 22L10 15L3 12L10 9L12 2Z"></path>
</svg>
</div>
</div>
<span class="font-serif text-aura-navy text-sm mb-2">Card III</span>
</div>
</div>
</div>
<!-- Instructions & Badges -->
<div class="flex flex-col items-center gap-3 w-full mt-auto">
<div class="flex items-center gap-2 text-gray-500 text-sm font-medium">
<svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M8 13v-8.5a1.5 1.5 0 0 1 3 0v7.5"></path>
<path d="M11 11.5v-2a1.5 1.5 0 1 1 3 0v2.5"></path>
<path d="M14 10.5a1.5 1.5 0 1 1 3 0v4"></path>
<path d="M17 11.5a1.5 1.5 0 1 1 3 0v4.5a6 6 0 0 1 -6 6h-2h.208a6 6 0 0 1 -5.012 -2.7L4 14l2.714 -2.986a2 2 0 0 1 2.964 .223l.322 .396"></path>
</svg>
          Tap one card to draw today's aura.
        </div>
<div class="flex items-center gap-2 bg-white/70 backdrop-blur-sm px-5 py-2.5 rounded-full border border-white/80 shadow-sm text-sm text-gray-600 font-medium">
<span class="text-aura-gold">✦</span>
          30-second ritual 
          <span class="text-gray-300">•</span> 
          private 
          <span class="text-gray-300">•</span> 
          just for you
        </div>
<!-- CTA Button -->
<button class="w-full mt-4 button-gradient rounded-full py-4 px-6 text-white font-serif text-xl shadow-lg hover:shadow-xl hover:scale-[1.02] transition-all flex items-center justify-center gap-3 relative overflow-hidden group">
<div class="absolute inset-0 bg-white/20 translate-x-[-100%] group-hover:translate-x-[100%] transition-transform duration-700 ease-in-out"></div>
<span class="text-white/80 text-lg">✦</span>
          Reveal My Aura
          <span class="text-white/80 text-lg">✦</span>
</button>
</div>
</section>
<!-- END: Main Content -->
<!-- BEGIN: Bottom Navigation -->
<nav class="absolute bottom-0 w-full bg-white/80 backdrop-blur-xl border-t border-white/50 rounded-t-3xl pb-safe pt-2 px-6 flex justify-between items-center shadow-[0_-10px_20px_rgba(0,0,0,0.03)] z-50">
<!-- Home (Active) -->
<a class="flex flex-col items-center flex-1 py-2 group" href="#">
<div class="bg-purple-100 rounded-2xl px-5 py-1.5 mb-1 flex items-center justify-center">
<svg class="w-6 h-6 text-aura-navy" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
<polyline points="9 22 9 12 15 12 15 22"></polyline>
</svg>
</div>
<span class="text-xs font-semibold text-aura-navy">Home</span>
<div class="w-1 h-1 bg-pink-400 rounded-full mt-1"></div>
</a>
<!-- Divider -->
<div class="h-8 w-[1px] bg-gray-200"></div>
<!-- Profile -->
<a class="flex flex-col items-center flex-1 py-2 text-gray-400 hover:text-gray-600 transition" href="#">
<div class="px-5 py-1.5 mb-1 flex items-center justify-center">
<svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" viewbox="0 0 24 24">
<path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
<circle cx="12" cy="7" r="4"></circle>
</svg>
</div>
<span class="text-xs font-medium">Profile</span>
<div class="w-1 h-1 bg-transparent rounded-full mt-1"></div>
</a>
</nav>
<!-- END: Bottom Navigation -->
</main>
</body></html>
