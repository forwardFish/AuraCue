<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            serif: ['"Playfair Display"', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            'aura-dark': '#1C2939',
            'aura-pink': '#F472B6',
            'aura-pink-light': '#FDF2F8',

            'aura-bg': '#FFF8F6',

<style data-purpose="custom-styles">
    body {
      background-color: #FFF8F6;
      /* Using a radial gradient to mimic the soft cloud glow from the image */
      background-image: 
        radial-gradient(circle at 15% 15%, rgba(253, 224, 235, 0.8) 0%, transparent 40%),
        radial-gradient(circle at 85% 25%, rgba(253, 224, 235, 0.8) 0%, transparent 40%),
        radial-gradient(circle at 50% 5%, rgba(254, 240, 138, 0.2) 0%, transparent 30%);

      background-attachment: fixed;

      left: 0;
      width: 100%;

      background-position: center top;
      z-index: -1;
      filter: blur(10px);
