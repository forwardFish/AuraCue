<style>
        body {
            background-color: #fcf8ff; /* surface */
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }
        
        .aura-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(97,61,222,0.15) 0%, rgba(252,248,255,0) 70%);
            border-radius: 50%;
            pointer-events: none;
            z-index: 0;
            filter: blur(40px);
        }

        .primary-gradient-bg {
            background: linear-gradient(135deg, #613dde 0%, #fe9c84 100%);
        }

        .selected-glow {
            box-shadow: 0 0 20px rgba(97, 61, 222, 0.15), inset 0 0 10px rgba(254, 156, 132, 0.1);
        }
        
        .sparkle {
            animation: twinkle 3s infinite ease-in-out alternate;
        }
        
        @keyframes twinkle {
            0% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.1); }
            100% { opacity: 0.3; transform: scale(0.8); }
        }

<style>
