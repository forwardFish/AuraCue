<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Share your Lucky Aura</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet"/>
<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Poppins:wght@300;400;500;600&display=swap');

    body {
      font-family: 'Poppins', sans-serif;
      background-color: #FDF9F1;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .heading-font {
      font-family: 'Playfair Display', serif;
    }

    .mobile-container {
      width: 100%;
      max-width: 414px;
      height: 100%;
      max-height: 896px;
      background-color: #FDF9F1;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
    }

    .glass-effect {
      background: rgba(253, 249, 241, 0.85);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
  </style>
</head>
<body>
<!-- BEGIN: MobileContainer -->
<main class="mobile-container">
<!-- BEGIN: Header -->
<header class="flex items-center justify-between px-6 py-4 mt-8 relative z-10">
<button class="text-gray-600 hover:text-gray-900 focus:outline-none">
<i class="fa-solid fa-xmark text-2xl"></i>
</button>
<div class="absolute left-1/2 transform -translate-x-1/2 text-orange-400 heading-font text-xl font-medium tracking-wide">
        AuraCue<span class="text-sm align-super font-bold">+</span>
</div>
<div class="w-6"></div> <!-- Spacer for flex balance -->
</header>
<!-- END: Header -->
<!-- BEGIN: MainContent -->
<section class="flex-1 overflow-y-auto px-6 pb-[300px] flex flex-col items-center pt-2 relative z-0">
<h1 class="heading-font text-2xl font-semibold text-[#2C3E50] mb-6 text-center">
        Share your Lucky Aura ✨
      </h1>
<!-- Preview Card -->
<div class="relative w-full max-w-[300px] aspect-[9/16] rounded-[32px] overflow-hidden shadow-xl border border-white/40">
<!-- Background Image (Using placeholder for the beautiful illustration) -->
<img alt="Lucky Aura Card Preview" class="absolute inset-0 w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDLOmKnYAoaZCOQfox4WWL_Nus2XORy4e8HTOPJfMwcTS96IqaTejIdd_KFjpMaG9JSCgUbZL77SFo83zTudKfCSpviRgFqADAgOJj9rJJY5AhFIdXWapm6fMFVpEQ4g7pzLiSnxMRqlL8YBru5zJoTaqaEr37HTyFk_bHR0SU_J_PsP1YmiUCKVD9OSY67_UsNhwkjTXc_X9KW5dBVf5QeTvXwcuxxYCWp9LHvi2oXOoDwSiujF-V60FsEqvtDyMAJvcwtiXhn"/>
<!-- Card Content Overlay -->
<div class="absolute inset-0 flex flex-col items-center justify-between p-6 bg-gradient-to-b from-purple-900/40 via-transparent to-pink-100/90 text-white">
<div class="text-center mt-4">
<div class="text-sm font-medium mb-1 text-white/90">AuraCue<span class="text-[10px] align-super">+</span></div>
<div class="text-sm opacity-90 mb-1">Today's</div>
<h2 class="heading-font text-3xl font-semibold mb-1">Lucky Aura</h2>
<div class="text-xs opacity-80">May 18, 2025</div>
</div>
<div class="w-full bg-white/80 backdrop-blur-md rounded-2xl p-4 text-[#2C3E50] shadow-sm mb-2 border border-white">
<div class="text-center font-medium mb-3">
<div>Soft Confidence</div>
<div>Romantic Clarity</div>
</div>
<div class="space-y-2 text-sm">
<div class="flex justify-between items-center">
<span class="opacity-80">Lucky Color</span>
<div class="flex gap-1">
<div class="w-4 h-4 rounded-full bg-purple-300"></div>
<div class="w-4 h-4 rounded-full bg-pink-400"></div>
<div class="w-4 h-4 rounded-full bg-orange-300"></div>
</div>
</div>
<div class="flex justify-between items-center">
<span class="opacity-80">Outfit Energy</span>
<span>👗</span>
</div>
<div class="flex justify-between items-center">
<span class="opacity-80">Social Action</span>
<span>💬</span>
</div>
<div class="flex justify-between items-center">
<span class="opacity-80">Tiny Ritual</span>
<span>🌹</span>
</div>
</div>
<div class="mt-4 text-center text-xs italic font-medium opacity-80 px-2">
               "Speak from heart, your words create magic."
             </div>
</div>
</div>
</div>
</section>
<!-- END: MainContent -->
<!-- BEGIN: ShareBottomSheet -->
<section class="absolute bottom-0 left-0 right-0 glass-effect rounded-t-[32px] px-4 pt-6 pb-8 shadow-[0_-10px_40px_rgba(0,0,0,0.05)] border-t border-white/50 z-20">
<!-- Share Grid -->
<div class="bg-white/60 backdrop-blur-xl rounded-[28px] p-4 mb-4 border border-white/50">
<div class="grid grid-cols-3 gap-y-6">
<!-- WeChat -->
<div class="flex flex-col items-center gap-2 cursor-pointer group">
<div class="w-14 h-14 rounded-full flex items-center justify-center transition-transform group-active:scale-95">
<!-- Using standard font-awesome icon as fallback -->
<i class="fa-brands fa-weixin text-4xl text-[#07C160]"></i>
</div>
<span class="text-xs font-medium text-gray-700">WeChat</span>
</div>
<!-- Moments -->
<div class="flex flex-col items-center gap-2 cursor-pointer group">
<div class="w-14 h-14 rounded-full flex items-center justify-center transition-transform group-active:scale-95">
<!-- Placeholder for Moments icon -->
<div class="w-[38px] h-[38px] bg-[#07C160] rounded-full flex items-center justify-center text-white">
<i class="fa-solid fa-life-ring text-xl"></i>
</div>
</div>
<span class="text-xs font-medium text-gray-700">Moments</span>
</div>
<!-- Xiaohongshu -->
<div class="flex flex-col items-center gap-2 cursor-pointer group">
<div class="w-14 h-14 rounded-full flex items-center justify-center transition-transform group-active:scale-95">
<!-- Placeholder for Xiaohongshu -->
<div class="w-[38px] h-[38px] bg-[#FF2442] rounded-lg flex items-center justify-center text-white font-bold text-xs">
                 小红书
               </div>
</div>
<span class="text-xs font-medium text-gray-700">Xiaohongshu</span>
</div>
<!-- Instagram Story -->
<div class="flex flex-col items-center gap-2 cursor-pointer group relative">
<div class="w-14 h-14 rounded-full flex items-center justify-center transition-transform group-active:scale-95 relative">
<!-- Gradient border wrapper for IG -->
<div class="absolute inset-0 bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-500 rounded-full p-[2px]">
<div class="w-full h-full bg-white rounded-full flex items-center justify-center">
<i class="fa-brands fa-instagram text-[28px] text-pink-600"></i>
</div>
</div>
</div>
<span class="text-xs font-medium text-gray-700 text-center leading-tight mt-1">Instagram<br/>Story</span>
</div>
<!-- Save Image -->
<div class="flex flex-col items-center gap-2 cursor-pointer group mt-1">
<div class="w-[38px] h-[38px] rounded-full flex items-center justify-center transition-transform group-active:scale-95 text-gray-700 border-2 border-gray-300">
<i class="fa-solid fa-download text-lg"></i>
</div>
<span class="text-xs font-medium text-gray-700">Save Image</span>
</div>
<!-- Copy Link -->
<div class="flex flex-col items-center gap-2 cursor-pointer group mt-1">
<div class="w-[38px] h-[38px] rounded-full flex items-center justify-center transition-transform group-active:scale-95 text-gray-700 border-2 border-gray-300">
<i class="fa-solid fa-link text-lg"></i>
</div>
<span class="text-xs font-medium text-gray-700">Copy Link</span>
</div>
</div>
<!-- Internal dividers (optional based on image, looks like there might be faint lines) -->
<div class="absolute top-[50%] left-4 right-4 h-px bg-gray-200/50"></div>
<div class="absolute top-4 bottom-4 left-[33%] w-px bg-gray-200/50"></div>
<div class="absolute top-4 bottom-4 left-[66%] w-px bg-gray-200/50"></div>
</div>
<!-- Cancel Button -->
<button class="w-full py-4 bg-red-50/50 hover:bg-red-50 text-gray-800 font-medium rounded-full text-[15px] transition-colors border border-red-100/50 backdrop-blur-sm">
        Cancel
      </button>
</section>
<!-- END: ShareBottomSheet -->
</main>
<!-- END: MobileContainer -->
</body></html>
