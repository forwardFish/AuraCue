<!DOCTYPE html>

<style data-purpose="custom-fonts">
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@400;500;600&display=swap');
    
    body {
      font-family: 'Inter', sans-serif;
    }
    
    h1, .brand-text, .date-selected {
      font-family: 'Playfair+Display', serif;
    }
  </style>
<script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            'aura-bg': '#FDFBF7',
            'aura-dark-blue': '#1A2B47',
            'aura-gray-text': '#727789',
            'aura-light-gray-text': '#BDBDBD',
            'aura-border': '#F0D4D4'
          },
          boxShadow: {
            'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',

        }
      }
    }
  </script>
<style data-purpose="custom-utilities">
    /* Utility to hide scrollbar for the picker areas if they were scrollable */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;  /* IE and Edge */
      scrollbar-width: none;  /* Firefox */
    }
  </style>
</head>
<body class="bg-aura-bg min-h-screen flex justify-center text-aura-dark-blue">
<!-- Main Container constraining width to mobile proportions -->
<main class="w-full max-w-[430px] min-h-screen relative flex flex-col items-center px-6 pt-12 pb-10 overflow-hidden">

<header class="w-full flex justify-between items-center mb-8 relative z-10">

<path d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" stroke-linecap="round" stroke-linejoin="round"></path>
</svg>
</button>
<!-- Logo -->
<div class="flex flex-col items-center absolute left-1/2 -translate-x-1/2">
<svg class="w-12 h-8 text-aura-dark-blue mb-1" fill="none" viewbox="0 0 48 32" xmlns="http://www.w3.org/2000/svg">
<path d="M24 0C24 0 16 8 16 16C16 24 24 32 24 32C24 32 32 24 32 16C32 8 24 0 24 0Z" fill="none" stroke="currentColor" stroke-width="1.5"></path>
<path d="M18 6C18 6 4 12 4 20C4 28 18 30 18 30" fill="none" stroke="currentColor" stroke-width="1.5"></path>

<path d="M36 28C36 28 48 24 48 16C48 8 36 10 36 10" fill="none" stroke="currentColor" stroke-width="1.5"></path>
</svg>
<span class="brand-text text-xl tracking-[0.2em] font-medium uppercase text-aura-dark-blue">AuraCue</span>
</div>
<!-- Empty space to balance flex -->
<div class="w-12 h-12"></div>
</header>
<!-- END: Header -->
<!-- BEGIN: Title Section -->
<section class="text-center w-full z-10 mt-6 mb-8 relative">
<div class="flex justify-center items-center gap-2 mb-3">
<img alt="Star" class="w-5 h-5 opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY6n_Js2XM8tgDIji1ldpp9Dwx8r1dJS5J2JJ2UshnNhDZ_8W58EOkdCqksQ33bp3RpR592iBrwqQFrYuKc7jO7eO7Q67wvnQJ4xRday2MmX7Cm80DQE0HNPChL-OfpksFIYBjESsCFfrv2E9s-5sfOd-LipbBrAtU8ofbAGovpPirHumOtTugtVo5B2IqoGi59tW5KPvaZO083JqOfjMLqvIVbwS68iNHOhwqccGRQ8P0kRHBhxxEowHfLrPM1ApmtS4hrrMzPwX2"/>

<img alt="Star" class="w-5 h-5 opacity-70" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY6n_Js2XM8tgDIji1ldpp9Dwx8r1dJS5J2JJ2UshnNhDZ_8W58EOkdCqksQ33bp3RpR592iBrwqQFrYuKc7jO7eO7Q67wvnQJ4xRday2MmX7Cm80DQE0HNPChL-OfpksFIYBjESsCFfrv2E9s-5sfOd-LipbBrAtU8ofbAGovpPirHumOtTugtVo5B2IqoGi59tW5KPvaZO083JqOfjMLqvIVbwS68iNHOhwqccGRQ8P0kRHBhxxEowHfLrPM1ApmtS4hrrMzPwX2"/>

<p class="text-aura-gray-text text-[15px] leading-relaxed max-w-[280px] mx-auto">

<div class="relative z-20 flex w-full h-full pt-10 pb-4">
<!-- Month Column -->
<div class="flex-1 flex flex-col items-center relative overflow-hidden">
<span class="text-[11px] font-semibold tracking-[0.15em] text-aura-dark-blue mb-2 absolute top-0">MONTH</span>
<div class="flex-1 overflow-y-auto no-scrollbar w-full flex flex-col items-center pt-[50px] pb-[50px] space-y-3">

<div class="text-[20px] text-aura-light-gray-text font-serif">September</div>
<!-- Selected State -->
<div class="text-[28px] text-aura-dark-blue date-selected h-[50px] flex items-center justify-center relative z-30 font-bold">October</div>
<div class="text-[20px] text-aura-light-gray-text font-serif">November</div>
<div class="text-[20px] text-aura-light-gray-text font-serif">December</div>
</div>
</div>
<!-- Day Column -->
<div class="flex-1 flex flex-col items-center relative overflow-hidden">
<span class="text-[11px] font-semibold tracking-[0.15em] text-aura-dark-blue mb-2 absolute top-0">DAY</span>
<div class="flex-1 overflow-y-auto no-scrollbar w-full flex flex-col items-center pt-[50px] pb-[50px] space-y-3">

<div class="text-[22px] text-aura-light-gray-text font-serif">8</div>
<div class="text-[22px] text-aura-light-gray-text font-serif">9</div>
</div>
</div>
</div>
</div>
<!-- Info Texts at bottom of card -->
<div class="relative z-20 w-full flex flex-col items-center pb-8 px-6">
<div class="flex items-center gap-2 mb-4">
<img alt="Star" class="w-3 h-3" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY6n_Js2XM8tgDIji1ldpp9Dwx8r1dJS5J2JJ2UshnNhDZ_8W58EOkdCqksQ33bp3RpR592iBrwqQFrYuKc7jO7eO7Q67wvnQJ4xRday2MmX7Cm80DQE0HNPChL-OfpksFIYBjESsCFfrv2E9s-5sfOd-LipbBrAtU8ofbAGovpPirHumOtTugtVo5B2IqoGi59tW5KPvaZO083JqOfjMLqvIVbwS68iNHOhwqccGRQ8P0kRHBhxxEowHfLrPM1ApmtS4hrrMzPwX2"/>
<span class="text-[13px] text-aura-dark-blue font-medium">We only need your month and day.</span>

<div class="flex items-center gap-3 max-w-[280px]">
<div class="w-9 h-9 flex items-center justify-center shrink-0">
<img alt="Lock" class="w-full h-full object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAOawgY2PvFR074ugh0JWaM89rGfiFqLnc334lH9Rw1p0gBNpbPZrCsSu1NnadPtg-mF4qaSK-jnkEQKKGlZg8oicJUCtsQP3ipxeiHD2wK5h0BqRSGSV2aNweMdifvfZx66yoI2FFxHSmU5hOQzrf3zJMUab7AgBHE8YrCqPOx3qLS0gVzHRlBC2QSsuDgtFxqMf3ky2NJe3hF4HM7TuDDk0J4oyvChDBTLHsrpZavLCb_OCgbbwdlnP2KbfVheX6HFzHsnefXV1k0"/>
</div>
<p class="text-[12px] text-aura-dark-blue leading-snug">
            Your birthday is private and never shared. It's used only to personalize your readings.
          </p>
</div>
</div>
</section>
<!-- END: Main Card Content -->
<!-- BEGIN: Footer Button -->
<div class="absolute bottom-10 left-0 w-full px-6 flex justify-center z-20">
<button class="relative w-full max-w-[340px] h-16 flex items-center justify-center group outline-none">

<div class="relative z-10 flex items-center gap-3">

<span class="text-white text-[22px] font-serif tracking-wide">Continue</span>
<img alt="Star" class="w-5 h-5" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDY6n_Js2XM8tgDIji1ldpp9Dwx8r1dJS5J2JJ2UshnNhDZ_8W58EOkdCqksQ33bp3RpR592iBrwqQFrYuKc7jO7eO7Q67wvnQJ4xRday2MmX7Cm80DQE0HNPChL-OfpksFIYBjESsCFfrv2E9s-5sfOd-LipbBrAtU8ofbAGovpPirHumOtTugtVo5B2IqoGi59tW5KPvaZO083JqOfjMLqvIVbwS68iNHOhwqccGRQ8P0kRHBhxxEowHfLrPM1ApmtS4hrrMzPwX2"/>

</button>
</div>

</main>
</body></html>
